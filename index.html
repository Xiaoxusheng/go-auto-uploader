            const showBuiltinBatchModal = ref(false);
            const builtinCurrentPage = ref(1);
            const builtinPageSize = ref(10);
            const builtinForm = ref({platform: 'Douyin', url: ''});
            const builtinBatchForm = ref({platform: 'Douyin', urls: ''});
            const builtinSettings = ref({quality: 'uhd', segment_time: 0, save_path: './downloads'});
            const builtinCookies = ref({douyin: '', kuaishou: '', soop: ''});
            const builtinTasks = ref([]);

            const builtinAdding = ref(false);
            const builtinBatchAdding = ref(false);
            const builtinSaving = ref(false);
            const builtinSavingCookies = ref(false);

            const sortedBuiltinTasks = computed(() => {
                try {
                    let list = [...(builtinTasks.value || [])];
                    if (builtinSearchQuery.value) {
                        const q = String(builtinSearchQuery.value || '').trim().toLowerCase();
                        if (q) {
                            list = list.filter(t => {
                                const nameMatch = t && t.anchor_name ? String(t.anchor_name).toLowerCase().includes(q) : false;
                                const roomMatch = t && t.room_id ? String(t.room_id).toLowerCase().includes(q) : false;
                                return nameMatch || roomMatch;
                            });
                        }
                    }
                    list.sort((a, b) => {
                        const isARecording = (a && a.status === '录制中') ? 1 : 0;
                        const isBRecording = (b && b.status === '录制中') ? 1 : 0;
                        return isBRecording - isARecording;
                    });
                    return list;
                } catch (e) {
                    console.error("内置引擎搜索/排序错误:", e);
                    return builtinTasks.value || [];
                }
            });

            const paginatedBuiltinTasks = computed(() => {
                const start = (builtinCurrentPage.value - 1) * builtinPageSize.value;
                return sortedBuiltinTasks.value.slice(start, start + builtinPageSize.value);
            });
            watch(builtinSearchQuery, () => {
                builtinCurrentPage.value = 1;
            });

            const builtinActiveCount = computed(() => builtinTasks.value.filter(t => !t.is_paused).length);
            const builtinRecordingCount = computed(() => builtinTasks.value.filter(t => t.status === '录制中').length);
            const isAllBuiltinActive = computed(() => builtinTasks.value.length > 0 && builtinTasks.value.some(t => !t.is_paused));

            /**
             * 构建并返回各个平台的直达跳转外链
             * @param {string} platform 平台名称标识
             * @param {string} roomId 平台对应的纯净房间 ID
             * @returns {string} 用于浏览器打开的完整直播间 URL
             */
            const getBuiltinLiveUrl = (platform, roomId) => {
                if (platform === 'Douyin') return `https://live.douyin.com/${roomId}`;
                if (platform === 'Kuaishou') return `https://live.kuaishou.com/u/${roomId}`;
                if (platform === 'Soop') return `https://play.sooplive.co.kr/${roomId}`;
                return roomId;
            };

            /**
             * 触发浏览器原生动作，下载目标直播间当前缓存的封面图
             * @param {string} url 图片源网络地址
             * @param {string} anchorName 供文件命名的清洗后主播名字
             */
            const downloadBuiltinCover = async (url, anchorName) => {
                try {
                    // 1. 发起网络请求获取图片的二进制流数据
                    const response = await fetch(url);
                    const blob = await response.blob();

                    // 2. 动态创建一个隐藏的 <a> 标签，用于触发浏览器的原生下载机制
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);

                    // 3. 清洗主播名称中的非法路径字符，防止下载文件命名报错
                    const safeName = (anchorName || '未命名主播').replace(/[/\\?%*:|"<>]/g, '-');

                    link.download = `${safeName}_封面图_${Date.now()}.png`;

                    // 5. 将标签暂时挂载到 DOM 树上并模拟点击，唤起下载任务
                    document.body.appendChild(link);
                    link.click();

                    // 6. 下载触发后立即清理 DOM 节点，并释放内存中的 Blob URL 避免内存泄漏
                    document.body.removeChild(link);
                    URL.revokeObjectURL(link.href);

                    Message.success('封面图片已开始下载');
                } catch (e) {
                    Message.error('图片下载失败，请直接右键保存图片');
                }
            };

            /**
             * 调用 API 接口远端拉取内置录制引擎的运行参数及其所依托的 Cookie 配置
             */
            const fetchBuiltinConfig = async () => {
                try {
                    const res1 = await api.get('/builtin_recorder/config');
                    if (res1.data) {
                        builtinSettings.value.quality = res1.data.quality || 'uhd';
                        builtinSettings.value.segment_time = res1.data.segment_time || 0;
                        builtinSettings.value.save_path = res1.data.save_path || './downloads';
                    }
                    const res2 = await api.get('/builtin_recorder/cookies');
                    if (res2.data) {
                        builtinCookies.value = res2.data;
                    }
                } catch (e) {
                }
            };

            /**
             * 唤起内置引擎的基础设置与 Cookie 更新面板
             */
            const openBuiltinSettingsModal = () => {
                showBuiltinSettingsModal.value = true;
                fetchBuiltinConfig();
            };

            /**
             * 将用户在前端更改的内置引擎基础参数打包，下发存储至系统后端
             */
            const saveBuiltinConfig = async () => {
                builtinSaving.value = true;
                try {
                    await api.post('/builtin_recorder/config', builtinSettings.value);
                    Message.success("内置引擎基础设置已生效！");
                    showBuiltinSettingsModal.value = false;
                } catch (e) {
                } finally {
                    builtinSaving.value = false;
                }
            };

            /**
             * 推送前端输入的多平台鉴权 Cookie 给后端文件落盘存储，以便穿透风控
             */
            const saveBuiltinCookies = async () => {
                builtinSavingCookies.value = true;
                try {
                    await api.post('/builtin_recorder/cookies', builtinCookies.value);
                    Message.success("内置引擎 Cookie 已热更新！");
                } catch (e) {
                } finally {
                    builtinSavingCookies.value = false;
                }
            };

            /**
             * 将前端输入框填写的链接地址，封装发起给后端录入系统的独立监听队列中
             */
            const handleAddBuiltin = async () => {
                if (!builtinForm.value.url.trim()) return Message.warning("请填写直播间地址或ID");
                builtinAdding.value = true;
                try {
                    await api.post('/builtin_recorder/add', builtinForm.value);
                    Message.success("任务添加成功");
                    builtinForm.value.url = '';
                } catch (e) {
                } finally {
                    builtinAdding.value = false;
                }
            };

            /**
             * 将多行链接文本批量解析并循坏添加至系统后端的监听记录仪中
             * @param {function} done Arco Vue `on-before-ok` 提供的生命周期回调指针
             */
            const handleBatchAddBuiltin = async (done) => {
                const lines = builtinBatchForm.value.urls.split('\n').map(l => l.trim()).filter(l => l !== '');
                if (lines.length === 0) {
                    Message.warning("内容为空");
                    done(false);
                    return;
                }
                builtinBatchAdding.value = true;
                let success = 0, fail = 0;
                for (const url of lines) {
                    try {
                        await api.post('/builtin_recorder/add', {platform: builtinBatchForm.value.platform, url: url});
                        success++;
                    } catch (e) {
                        fail++;
                    }
                }
                builtinBatchAdding.value = false;
                if (fail === 0) {
                    Message.success(`成功批量添加 ${success} 个任务`);
                    builtinBatchForm.value.urls = '';
                    done(true);
                } else {
                    Message.warning(`添加完成，成功 ${success} 个，失败 ${fail} 个`);
                    done(true);
                }
            };

            /**
             * 触发针对单个内置引擎任务的暂停/恢复操作逻辑
             * @param {boolean} checked 开关当前滑动的布尔状态
             * @param {Object} record 该数据行绑定的监控实体
             */
            const handleSwitchBuiltin = async (checked, record) => {
                record.switching = true;
                const action = checked ? 'resume' : 'pause';
                try {
                    await handleControlBuiltin(action, record);
                } finally {
                    record.switching = false;
                }
            };

            /**
             * 根据给定的动作指令 (挂起、继续或移除)，封装网络请求下发给后端底层去干预任务协程
             * @param {string} action 指令类型 ('resume', 'pause', 'delete')
             * @param {Object} record 操作锁定的数据块
             * @returns {Promise<boolean>} 是否执行成功的状态反馈
             */
            const handleControlBuiltin = async (action, record) => {
                try {
                    await api.post('/builtin_recorder/control', {
                        action: action,
                        platform: record.platform,
                        room_id: record.room_id
                    });
                    if (action === 'delete') Message.success("任务已删除");
                    return true;
                } catch (e) {
                    return false;
                }
            };

            /**
             * 执行最高权限的系统级批处理指令，同步强行休眠或恢复所有正在监听队列中的引擎任务
             * @param {boolean} val 全局主控制开关滑动的动作状态
             */
            const handleMasterSwitchBuiltin = async (val) => {
                const action = val ? 'resume_all' : 'pause_all';
                const actionName = val ? '全部开启' : '全部暂停';
                try {
                    await api.post('/builtin_recorder/control_all', {action: action});
                    Message.success(`已成功执行：${actionName}`);
                    builtinTasks.value.forEach(t => {
                        t.is_paused = !val;
                    });
                } catch (e) {
                }
            };

            /**
             * 全局快捷键监听注册：绑定 Ctrl+X 键可一键聚焦搜索框
             * @param {KeyboardEvent} e 全局捕获的按键事件
             */
            const handleGlobalKeydown = (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'x') {
                    if (activeTab.value === 'streamers') {
                        e.preventDefault();
                        if (streamerSearchRef.value) {
                            streamerSearchRef.value.focus();
                            Message.info('已激活搜索框');
                        }
                    }
                }
            };

            const recorderStatus = ref('读取中...');
            const recorderControlLoading = ref(false);
            const showLogsModal = ref(false);
            const recorderLogsContent = ref('');
            const dockerLogsRef = ref(null);
            const showBatchAddModal = ref(false);
            const batchAddText = ref('');
            const batchAddLoading = ref(false);
            const cookiesForm = reactive({douyin: '', kuaishou: '', sooplive: '', liveSavePath: ''});
            const cookiesLoading = ref(false);

            const radarState = computed(() => {
                const next = systemStatus.nextScanTime;
                if (!systemStatus.running || next === 0) return {
                    status: 'paused',
                    text: '系统已挂起',
                    color: 'var(--color-text-3)'
                };
                if (next === -1) return {status: 'scanning', text: '正在同步目录状态...', color: '#165DFF'};
                const diffSeconds = Math.floor((next - clientTime.value) / 1000);
                if (diffSeconds < 0) return {status: 'scanning', text: '准备执行扫描...', color: '#165DFF'};
                const m = Math.floor(diffSeconds / 60).toString().padStart(2, '0');
                const s = (diffSeconds % 60).toString().padStart(2, '0');
                const isUrgent = diffSeconds <= 60;
                return {
                    status: 'waiting',
                    text: `${m} 分 ${s} 秒`,
                    color: isUrgent ? '#F53F3F' : 'var(--color-text-1)'
                };
            });

            /**
             * 依据容量数据，动态比对排行榜内目标，算计并描绘出具有差异感的刻度线进度百分比
             * @param {number} size 磁盘空间占用字节数据
             * @returns {number} 用于 UI 渲染的规范化浮点百分率 (0-1)
             */
            const calculateRankPercent = (size) => {
                if (!statsData.rank || statsData.rank.length === 0 || size === 0) return 0;
                const max = statsData.rank[0].size;
                return Number((size / max).toFixed(2));
            };

            /**
             * 解析外部引擎的本地保存映射并读取关联反防盗链 Cookie 数据
             */
            const fetchCookies = async () => {
                if (!configForm.value.recorderConfigPath) return;
                cookiesLoading.value = true;
                try {
                    const res = await api.get('/cookies');
                    Object.assign(cookiesForm, res.data);
                } catch (e) {
                } finally {
                    cookiesLoading.value = false;
                }
            };

            /**
             * 将配置有外部引擎凭证的数据模型打包上报，强制将其热合并入远程 Docker 共享文件路径内
             */
            const saveCookies = async () => {
                if (!configForm.value.recorderConfigPath) {
                    Message.warning('系统安全拦截：请先在【上传参数设置】中配置 config.ini 物理路径！');
                    return;
                }
                cookiesLoading.value = true;
                try {
                    await api.put('/cookies', cookiesForm);
                    Message.success('录制引擎配置已安全追记至文件！');
                } catch (e) {
                } finally {
                    cookiesLoading.value = false;
                }
            };

            const uploadingTasks = computed(() => liveTasks.value.filter(t => t.status === 'uploading' || t.status === 'waiting'));
            const completedTasks = computed(() => liveTasks.value.filter(t => t.status !== 'uploading' && t.status !== 'waiting'));

            const historyQuery = reactive({page: 1, limit: 15, filename: '', status: ''});
            const historyData = reactive({items: [], total: 0});
            const pagination = computed(() => ({
                total: historyData.total,
                current: historyQuery.page,
                pageSize: historyQuery.limit,
                size: 'small',
                showTotal: !isMobile.value,
                showPageSize: !isMobile.value,
                pageSizeOptions: [15, 50, 100, 200],
                hideOnSinglePage: false
            }));

            const logQuery = reactive({page: 1, limit: 50, level: '', keyword: ''});
            const logData = reactive({items: [], total: 0});
            const logExportLimit = ref(1000);
            const logListRef = ref(null); // 修改为使用 a-list 虚拟滚动的 ref

            const configForm = ref({});
            const configDirsString = ref('');

            let originalConfigSnapshot = {};
            let chartInstance = null;

            /**
             * 调动底层 ECharts 库渲染前端页面内直观的队列任务状态分布占比饼图
             */
            const renderChart = () => {
                if (activeTab.value !== 'overview') return;
                nextTick(() => {
                    const dom = document.getElementById('queueChart');
                    if (!dom) return;
                    if (!chartInstance) {
                        chartInstance = echarts.init(dom);
                    } else {
                        chartInstance.resize();
                    }
                    const total = queueStatus.waiting + queueStatus.uploading + queueStatus.success + queueStatus.failed;
                    if (total === 0) {
                        chartInstance.setOption({
                            title: {
                                text: '暂无任务数据',
                                left: 'center',
                                top: 'center',
                                textStyle: {color: '#999', fontSize: 14}
                            }, series: []
                        });
                        return;
                    }
                    const option = {
                        title: { show: false }, // ✨ 修复：在此添加 show: false 解决 ECharts 缓存文字残留重叠 Bug
                        backgroundColor: 'transparent',
                        tooltip: {trigger: 'item', formatter: '{b}状态: {c} 个文件 ({d}%)'},
                        legend: {
                            bottom: '4%',
                            left: 'center',
                            textStyle: {color: isDarkMode.value ? '#E5E6EB' : '#1D2129'},
                            itemGap: 12
                        },
                        color: ['#F5A623', '#165DFF', '#00B42A', '#F53F3F'],
                        series: [{
                            type: 'pie', radius: ['40%', '65%'], center: ['50%', '40%'], avoidLabelOverlap: true,
                            itemStyle: {
                                borderRadius: 6,
                                borderColor: isDarkMode.value ? '#232324' : '#ffffff',
                                borderWidth: 2
                            },
                            label: {show: false, position: 'center'},
                            emphasis: {label: {show: true, fontSize: '16', fontWeight: 'bold'}},
                            labelLine: {show: false},
                            data: [
                                {value: queueStatus.waiting, name: '等待中'}, {
                                    value: queueStatus.uploading,
                                    name: '上传中'
                                },
                                {value: queueStatus.success, name: '已成功'}, {
                                    value: queueStatus.failed,
                                    name: '已失败'
                                }
                            ]
                        }]
                    };
                    chartInstance.setOption(option);
                });
            };

            /**
             * 提取远端推送的历史记录进行归纳整合，借用 ECharts 渲染勾勒近 7 日上传流量及负载数据的折线走势图
             */
            const renderTrendChart = () => {
                const dom = document.getElementById('trendChart');
                if (!dom) return;
                if (!trendChartInstance) {
                    trendChartInstance = echarts.init(dom);
                } else {
                    trendChartInstance.resize();
                }
                const isDark = document.body.getAttribute('arco-theme') === 'dark';
                const textColor = isDark ? 'rgba(255,255,255,0.7)' : '#4E5969';
                const splitLineColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.05)';

                const option = {
                    grid: {top: '15%', left: '3%', right: '4%', bottom: '8%', containLabel: true},
                    tooltip: {
                        trigger: 'axis',
                        backgroundColor: isDark ? '#232324' : '#fff',
                        borderColor: 'rgba(0,0,0,0.1)',
                        textStyle: {color: isDark ? '#fff' : '#000'}
                    },
                    legend: {
                        data: ['上传流量 (GB)', '文件数量 (个）'],
                        textStyle: {color: textColor},
                        top: '0%',
                        right: 10
                    },
                    xAxis: {
                        type: 'category',
                        data: (statsData.trend || []).map(i => i.date),
                        axisLine: {lineStyle: {color: splitLineColor}},
                        axisLabel: {color: textColor}
                    },
                    yAxis: [
                        {
                            type: 'value',
                            name: 'GB',
                            splitLine: {lineStyle: {color: splitLineColor}},
                            axisLabel: {color: textColor}
                        },
                        {
                            type: 'value',
                            name: '个',
                            position: 'right',
                            splitLine: {show: false},
                            axisLabel: {color: textColor}
                        }
                    ],
                    series: [
                        {
                            name: '上传流量 (GB)', type: 'line', smooth: true, yAxisIndex: 0,
                            data: (statsData.trend || []).map(i => i.size.toFixed(2)),
                            areaStyle: {
                                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{
                                    offset: 0,
                                    color: 'rgba(22, 93, 255, 0.4)'
                                }, {offset: 1, color: 'rgba(22, 93, 255, 0)'}])
                            },
                            itemStyle: {color: '#165DFF'}, lineStyle: {width: 3}
                        },
                        {
                            name: '文件数量',
                            type: 'line',
                            smooth: true,
                            yAxisIndex: 1,
                            data: (statsData.trend || []).map(i => i.count),
                            itemStyle: {color: '#FF7D00'},
                            lineStyle: {width: 3, type: 'dashed'}
                        }
                    ]
                };
                trendChartInstance.setOption(option);
            };

            watch(queueStatus, renderChart, {deep: true});
            watch(activeTab, (val) => {
                if (val === 'overview') {
                    setTimeout(() => {
                        renderChart();
                        renderTrendChart();
                    }, 200);
                }
            });

            window.addEventListener('resize', () => {
                handleResize();
                if (chartInstance) chartInstance.resize();
                if (trendChartInstance) trendChartInstance.resize();
            });

            /**
             * 处理后台管理系统管理员身份验证核发接口的 POST 请求与持久化业务
             */
            const handleLogin = async () => {
                loginLoading.value = true;
                try {
                    const res = await api.post('/auth/login', loginForm);
                    localStorage.setItem('upload_system_token', res.data.token);
                    isLoggedIn.value = true;
                    Message.success('网关认证成功');
                    initDashboard();

                    // 在下一个微任务周期中执行图表绘制，避开因 Vue 的 v-if 更新延迟带来的 DOM Null 异常
                    nextTick(() => {
                        if (activeTab.value === 'overview') {
                            renderChart();
                            renderTrendChart();
                        }
                    });
                } catch (e) {
                } finally {
                    loginLoading.value = false;
                }
            };

            /**
             * 安全熔断登出当前用户授权系统，销毁 Token 会话且清理各类长轮询内存占用
             */
            const handleLogout = async () => {
                try {
                    await api.post('/auth/logout');
                } catch (e) {
                }
                localStorage.removeItem('upload_system_token');
                isLoggedIn.value = false;
                cleanUp();
            };

            /**
             * 提取并赋予面板底层引擎当前的健康运转状态码与全局基础属性配置信息
             */
            const fetchStatus = async () => {
                try {
                    Object.assign(systemStatus, (await api.get('/status')).data);
                } catch (e) {
                }
            };

            /**
             * 通过 GET 端口读取底层缓冲区的各个级别任务队列积累并发压力的程度数值
             */
            const fetchQueue = async () => {
                try {
                    Object.assign(queueStatus, (await api.get('/tasks/queue')).data);
                } catch (e) {
                }
            };

            /**
             * 高速轮询拿取处于活动上传与排队中的内存记录快照并进行局部界面差量渲染替换
             */
            const fetchLiveTasks = async () => {
                try {
                    liveTasks.value = (await api.get('/tasks/live')).data || [];
                } catch (e) {
                }
            };

            /**
             * 向系统下达指令并通过 Shell 获取被托管外置 Docker 容器现在的运转表象状态
             */
            const fetchRecorderStatus = async () => {
                try {
                    const res = await api.get('/recorder/status');
                    recorderStatus.value = res.data || '获取失败';
                } catch (e) {
                    recorderStatus.value = '离线/异常';
                }
            };

            /**
             * 对挂载关联在系统的指定 Docker 应用发出诸如强制关停、热重载以及启动等动作命令
             * @param {string} action 指令的英文标识符 ('start', 'stop', 'restart')
             */
            const controlRecorder = async (action) => {
                if (!configForm.value.recorderContainer) {
                    Message.error('请先在上传参数设置中配置 Docker 容器名');
                    activeTab.value = 'settings';
                    return;
                }
                recorderControlLoading.value = true;
                try {
                    await api.post('/recorder/control', null, {params: {action}});
                    Message.success('操作已成功执行');
                    fetchRecorderStatus();
                } catch (e) {
                } finally {
                    recorderControlLoading.value = false;
                }
            };

            /**
             * 解析外部独立 Docker 录制器的 Shell 控制台终端抛出的调试运行回显内容
             */
            const fetchRecorderLogs = async () => {
                try {
                    const res = await api.get('/recorder/logs');
                    recorderLogsContent.value = res.data;
                    nextTick(() => {
                        if (dockerLogsRef.value) {
                            dockerLogsRef.value.scrollTop = dockerLogsRef.value.scrollHeight;
                        }
                    });
                } catch (e) {
                }
            };

            /**
             * 控制前端外部录像引擎排查追踪模态视图弹窗的显示与预加载工作
             */
            const openLogsModal = () => {
                showLogsModal.value = true;
                fetchRecorderLogs();
            };

            /**
             * 轮询对比时间戳以探测判断目前有几个主播真正处于底层数据推流落盘期间
             */
            const fetchActiveStreamers = async () => {
                try {
                    const res = await api.get('/streamers/active');
                    activeRecordingStreamers.value = res.data || [];
                } catch (e) {
                }
            };

            /**
             * 将外部录制系统内解析后的关注列表配置文件内容拉取映射同步于前端表格
             */
            const fetchStreamers = async () => {
                if (isSavingStreamers.value) return;
                try {
                    const res = await api.get('/streamers');
                    streamers.value = res.data || [];
                } catch (e) {
                }
            };

            /**
             * 对接接口以修改底层物理名单内容，并依据保存状态做出相应的系统气泡反馈
             * @param {boolean} showMsg 可选指示参数，判断是否对使用者进行 Toast 对话显示
             */
            const saveStreamers = async (showMsg = true) => {
                isSavingStreamers.value = true;
                try {
                    await api.put('/streamers', streamers.value);
                    if (showMsg) Message.success('录制名单配置已热更新并保存到文件');
                } catch (e) {
                } finally {
                    setTimeout(() => {
                        isSavingStreamers.value = false;
                    }, 500);
                }
            };

            /**
             * 解析用户提交的纯文本格式将单个主播资料注册装填入被监视列表中
             */
            const addStreamer = () => {
                if (!newStreamer.url) {
                    Message.warning('请输入直播间链接');
                    return;
                }
                streamers.value.unshift({url: newStreamer.url.trim(), name: newStreamer.name.trim(), active: true});
                newStreamer.url = '';
                newStreamer.name = '';
                saveStreamers();
            };

            /**
             * 分析弹窗录入框的段落数据流，对其作行级拆解及格式纠偏过滤操作后实现大数量列表合并压入
             * @param {function} done Arco Vue 模态框注入的完成标记钩子
             */
            const handleBatchAdd = async (done) => {
                if (!batchAddText.value.trim()) {
                    Message.warning('请输入要批量添加的主播内容');
                    done(false);
                    return;
                }
                const lines = batchAddText.value.split('\n').map(l => l.trim()).filter(l => l);
                if (lines.length > 50) {
                    Message.error(`单次最多添加 50 个`);
                    done(false);
                    return;
                }
                const newEntries = [];
                for (const line of lines) {
                    let url = line;
                    let name = '';
                    const commaIndex = line.indexOf(',') > -1 ? line.indexOf(',') : line.indexOf('，');
                    if (commaIndex > -1) {
                        url = line.substring(0, commaIndex).trim();
                        name = line.substring(commaIndex + 1).trim();
                    }
                    if (url) newEntries.push({url, name, active: true});
                }
                if (newEntries.length === 0) {
                    Message.warning('未能解析到链接');
                    done(false);
                    return;
                }
                batchAddLoading.value = true;
                try {
                    await api.post('/streamers', newEntries);
                    Message.success(`成功批量添加了 ${newEntries.length} 个记录`);
                    batchAddText.value = '';
                    done(true);
                } catch (e) {
                    done(false);
                } finally {
                    batchAddLoading.value = false;
                }
            };

            /**
             * 定位查找指定配置源于本地状态链表内的位置并调用函数将其从内存中抛除
             * @param {Object} record 需要被解绑消除的映射项对象值
             */
            const removeStreamer = (record) => {
                const index = streamers.value.findIndex(s => s.url === record.url);
                if (index > -1) {
                    streamers.value.splice(index, 1);
                    saveStreamers();
                    Message.success('已成功删除');
                }
            };

            /**
             * 接受来自后台加密通道推送的数据触发点，令前端图标产生 CSS 脉冲动画特效以示心跳通信正在发生
             * @param {string} eventType 数据触发信号事件类别标示符
             */
            const triggerWsPulse = (eventType) => {
                wsStats.msgCount++;
                wsStats.lastEvent = eventType;
                wsStats.pulse = true;
                if (wsPulseTimeout) clearTimeout(wsPulseTimeout);
                wsPulseTimeout = setTimeout(() => {
                    wsStats.pulse = false;
                }, 150);
            };

            // ✨ 定义重试状态控制变量用于指数退避算法
            let reconnectAttempts = 0;
            const maxReconnectDelay = 30000; // 重试间隔上限设为 30 秒
            const baseReconnectDelay = 2000; // 基础间隔 2 秒

            /**
             * 构建全功能的 WebSocket 客户端信道，并封装断线重连、密文解码鉴别与心跳存活自动确认处理机
             */
            const connectWS = async () => {
                // 如果开启了加密但是未获取到 SessionID 则主动握手
                if (window._encryptionEnabled && !_sessionId) {
                    await initSecurity();
                }

                if (ws) {
                    ws.onclose = null;
                    ws.close();
                }
                wsStatus.value = 'connecting';
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';

                // 拼接 session_id 让后端识别当前 WebSocket 连接属于哪个加密上下文
                let wsUrl = `${protocol}//${window.location.host}/ws/live`;
                if (window._encryptionEnabled && _sessionId) {
                    wsUrl += `?session_id=${_sessionId}`;
                }

                ws = new WebSocket(wsUrl);

                lastPongTime = Date.now();

                ws.onopen = () => {
                    wsStatus.value = 'connected';
                    lastPongTime = Date.now();
                    reconnectAttempts = 0; // ✨ 连上后立刻清零重试次数，恢复健康状态

                    if (pingTimer) clearInterval(pingTimer);
                    pingTimer = setInterval(async () => {
                        if (ws.readyState === WebSocket.OPEN) {
                            if (Date.now() - lastPongTime > 15000) {
                                console.warn("[WS] 心跳超时，连接已假死，强制触发断开重连...");
                                ws.close();
                                return;
                            }
                            const pingRaw = JSON.stringify({type: 'ping', payload: Date.now()});

                            // 心跳包的独立加密机制
                            if (window._encryptionEnabled && _cryptoKey) {
                                const encryptedPing = await encryptPayload(pingRaw);
                                ws.send(JSON.stringify({encrypted: encryptedPing}));
                            } else {
                                ws.send(pingRaw);
                            }
                        }
                    }, 5000);
                };

                ws.onmessage = async (event) => {
                    try {
                        lastPongTime = Date.now();

                        let msgObj = JSON.parse(event.data);

                        // 信道密文截获解析分发器
                        if (window._encryptionEnabled && msgObj.encrypted) {
                            const decryptedStr = await decryptPayload(msgObj.encrypted);
                            msgObj = JSON.parse(decryptedStr);
                        }

                        const msg = msgObj;

                        if (msg.type === 'pong') {
                            wsLatency.value = Date.now() - msg.payload;
                            return;
                        }

                        triggerWsPulse(msg.type);

                        // 全局业务信号指令路由
                        if (msg.type === 'systemAlert') {
                            const payload = msg.payload;
                            Notification[payload.level || 'error']({
                                title: payload.title,
                                content: payload.message + `\n\n触发时间: ${payload.time}`,
                                duration: 0,
                                closable: true,
                                position: 'bottomRight',
                                style: {whiteSpace: 'pre-wrap', wordBreak: 'break-all', lineHeight: '1.6'}
                            });
                        } else if (msg.type === 'trafficMetrics') {
                            trafficMetrics.speed = msg.payload.speed;
                            trafficMetrics.time = msg.payload.time;
                        } else if (msg.type === 'statsTrend') {
                            const newStr = JSON.stringify(msg.payload);
                            if (window.lastStatsStr !== newStr) {
                                window.lastStatsStr = newStr;
                                statsData.trend = msg.payload.trend || [];
                                statsData.rank = msg.payload.rank || [];
                                if (activeTab.value === 'overview' && statsData.trend.length > 0) {
                                    nextTick(() => renderTrendChart());
                                }
                            }
                        } else if (msg.type === 'recorderStatus') {
                            recorderStatus.value = msg.payload;
                        } else if (msg.type === 'activeStreamers') {
                            activeRecordingStreamers.value = msg.payload || [];
                        } else if (msg.type === 'streamersData') {
                            if (!isSavingStreamers.value) {
                                const newStr = JSON.stringify(msg.payload);
                                if (window.lastStreamersStr !== newStr) {
                                    streamers.value = msg.payload;
                                    window.lastStreamersStr = newStr;
                                }
                            }
                        } else if (msg.type === 'uploadProgress') {
                            const idx = liveTasks.value.findIndex(t => t.id === msg.payload.id);
                            if (idx > -1) {
                                liveTasks.value[idx].uploaded = msg.payload.uploaded;
                                liveTasks.value[idx].speed = msg.payload.speed;
                                liveTasks.value[idx].status = msg.payload.status;
                            } else {
                                liveTasks.value.unshift({
                                    id: msg.payload.id, filename: msg.payload.filename, path: msg.payload.path,
                                    size: msg.payload.size, uploaded: msg.payload.uploaded, speed: msg.payload.speed,
                                    status: msg.payload.status, startTime: msg.payload.startTime, duration: 0
                                });
                            }
                        } else if (msg.type === 'systemStatus') {
                            Object.assign(systemStatus, msg.payload);
                        } else if (msg.type === 'queueStatus') {
                            Object.assign(queueStatus, msg.payload);
                        } else if (msg.type === 'taskDone') {
                            const idx = liveTasks.value.findIndex(t => t.id === msg.payload.id);
                            if (idx > -1) {
                                liveTasks.value[idx].status = msg.payload.status;
                                if (msg.payload.progress === 100) liveTasks.value[idx].uploaded = liveTasks.value[idx].size;
                                if (msg.payload.error) liveTasks.value[idx].error = msg.payload.error;
                            }
                            if (activeTab.value === 'history') fetchHistory();
                        } else if (msg.type === 'newLog') {
                            const log = msg.payload;
                            if (logQuery.page === 1 && !logQuery.keyword && (!logQuery.level || logQuery.level === log.level)) {
                                logData.items.push(log);
                                logData.total++;
                                if (logData.items.length > logQuery.limit) {
                                    logData.items.shift();
                                }
                            }
                        } else if (msg.type === 'scanStarted') {
                            let titleText = '📡 系统扫描已启动';
                            let contentText = `当前并发：${msg.payload.workers} 个线程\n扫描目标：共 ${msg.payload.dirs.length} 个目录`;
                            if (msg.payload.trigger === 'auto') {
                                titleText = '⏱️ 定时扫描执行中';
                                contentText = `定时周期：${msg.payload.interval} 分钟/次\n` + contentText;
                            } else if (msg.payload.trigger === 'start') {
                                titleText = '▶️ 系统已恢复运行';
                            } else if (msg.payload.trigger === 'rescan') {
                                titleText = '🔍 手动深度扫描启动';
                            } else if (msg.payload.trigger === 'config-update') {
                                titleText = '⚙️ 配置重载扫描';
                            }
                            Notification.info({
                                title: titleText, content: contentText, position: 'bottomRight', duration: 4000,
                                style: {whiteSpace: 'pre-wrap', lineHeight: '1.6'}
                            });
                        } else if (msg.type === 'scanFinished') {
                            Notification.success({
                                title: '✅ 扫描侦测完毕',
                                content: `本轮深度比对完成，共发现并压入 ${msg.payload.added} 个新文件至队列中。`,
                                position: 'bottomRight',
                                duration: 4000
                            });
                        } else if (msg.type === 'builtinTasks') {
                            // ✨ 核心修复：绝不重新赋值 builtinTasks.value，而是原地操作数组
                            const payloadTasks = msg.payload || [];

                            // 1. 从原数组中移除后端已经不存在的任务
                            for (let i = builtinTasks.value.length - 1; i >= 0; i--) {
                                const exists = payloadTasks.find(t => t.platform === builtinTasks.value[i].platform && t.room_id === builtinTasks.value[i].room_id);
                                if (!exists) {
                                    builtinTasks.value.splice(i, 1);
                                }
                            }

                            // 2. 更新存在的任务，或将新任务追加到原数组
                            payloadTasks.forEach(pTask => {
                                const existing = builtinTasks.value.find(t => t.platform === pTask.platform && t.room_id === pTask.room_id);
                                if (existing) {
                                    // 原地合并属性
                                    existing.anchor_name = pTask.anchor_name;
                                    existing.status = pTask.status;
                                    existing.duration = pTask.duration;
                                    existing.file_size = pTask.file_size;
                                    existing.is_paused = pTask.is_paused;
                                    existing.avatar = pTask.avatar;
                                    // 维持预览图更新逻辑
                                    if (globalPreview.visible && globalPreview.platform === pTask.platform && globalPreview.roomId === pTask.room_id) {
                                        globalPreview.src = pTask.avatar;
                                    }
                                } else {
                                    pTask.switching = false;
                                    builtinTasks.value.push(pTask);
                                }
                            });
                        }
                    } catch (e) {
                        console.error("解密流数据发生异常：", e);
                    }
                };

                ws.onclose = () => {
                    wsStatus.value = 'disconnected';
                    wsLatency.value = 0;
                    if (pingTimer) clearInterval(pingTimer);

                    if (isLoggedIn.value) {
                        // ✨ 核心算法：指数退避 (1.5的幂次方) + Jitter 随机抖动 (0~1000ms)
                        const delay = Math.min(
                            maxReconnectDelay,
                            baseReconnectDelay * Math.pow(1.5, reconnectAttempts)
                        ) + (Math.random() * 1000);

                        reconnectAttempts++;

                        console.warn(`[WS] 连接断开，将在 ${(delay/1000).toFixed(1)} 秒后进行第 ${reconnectAttempts} 次重连...`);
                        setTimeout(connectWS, delay);
                    }
                };
                ws.onerror = () => {
                    wsStatus.value = 'disconnected';
                };
            };

            /**
             * 提取对系统状态发起干预操作的事件，并对诸如系统起停指令予以强弹窗提醒用户防手滑拦截
             * @param {string} action 指令的动作短语
             */
            const control = (action) => {
                const actionText = {
                    'start': '确定要启动系统吗？', 'pause': '确定要暂停吗？', 'stop': '危险操作：强行停止系统吗？',
                    'rescan': '立刻触发深度扫描吗？', 'relogin': '刷新远端授权？', 'clear-fail-queue': '清空失败记录？',
                    'retry-fail-queue': '重试失败任务？', 'clear-success-queue': '清空成功记录？'
                };
                Modal.confirm({
                    title: '操作确认',
                    content: actionText[action] || '确定要执行吗？',
                    okText: '执行',
                    cancelText: '取消',
                    onOk: async () => {
                        try {
                            await api.post(`/control/${action}`);
                            Message.success('指令已下发');
                        } catch (e) {
                        }
                    }
                });
            };

            /**
             * 依据设定的分页搜索结构从服务端数据库载入过往切片传输完成与否的历史详单
             */
            const fetchHistory = async () => {
                try {
                    const res = await api.get('/tasks/history', {params: historyQuery});
                    historyData.items = res.data.items || [];
                    historyData.total = res.data.total || 0;
                } catch (e) {
                }
            };

            /**
             * 表格组件页脚翻页操作触发器，回传页面角标供上游检索新数据层使用
             * @param {number} page 用户指定的检索页面索引位标
             */
            const onPageChange = (page) => {
                historyQuery.page = page;
                fetchHistory();
            };

            /**
             * 触发记录表单每页载客量重新定配操作功能
             * @param {number} size 新定的数据载荷行数
             */
            const onPageSizeChange = (size) => {
                historyQuery.limit = size;
                historyQuery.page = 1;
                fetchHistory();
            };

            /**
             * 向系统层发起日志检索读取需求，依带条件的结构拉取历史后台控制台运行输出并展现给终端用户使用
             */
            const fetchLogs = async () => {
                try {
                    const res = await api.get('/logs', {params: logQuery});
                    logData.items = res.data.items || [];
                    logData.total = res.data.total || 0;
                } catch (e) {
                }
            };

            /**
             * 拼接 URL 暴露出的系统导出端口以便将庞大日记源文件下达到本地磁盘予以物理隔离保留
             */
            const downloadLogs = async () => {
                try {
                    let url = `/api/v1/logs/download?limit=${logExportLimit.value}&level=${logQuery.level}&keyword=${logQuery.keyword}`;
                    // 如果开启了加密，则必须在 URL 中携带当前会话的 Session_ID 供后端加密使用
                    if (window._encryptionEnabled) {
                        if (!_sessionId) await initSecurity();
                        url += `&session_id=${_sessionId}`;
                    }
                    // 使用 window.open 触发浏览器原生下载机制
                    window.open(url, '_blank');
                } catch (e) {
                    Message.error("日志导出失败: " + e.message);
                }
            };

            /**
             * 请求读取系统设定的参数基值进行表单自动初始化还原填空动作
             */
            const fetchConfig = async () => {
                try {
                    const res = await api.get('/config');
                    configForm.value = res.data || {};
                    originalConfigSnapshot = JSON.parse(JSON.stringify(res.data || {}));
                    configDirsString.value = (res.data.dirs || []).join(', ');
                } catch (e) {
                }
            };

            /**
             * 把由终端修改生效确认的核心规则打包成请求传于服务器，由后端改写系统物理常驻设置项文件生效
             */
            const saveConfig = async () => {
                try {
                    configForm.value.dirs = configDirsString.value.split(',').map(s => s.trim()).filter(s => s);
                    await api.put('/config', configForm.value);
                    Notification.success({
                        title: '⚙️ 参数已生效',
                        content: '配置项已热更新',
                        position: 'bottomRight',
                        duration: 5000
                    });

                    if (originalConfigSnapshot.enableEncryption !== configForm.value.enableEncryption) {
                        Modal.info({
                            title: '安全配置已变更',
                            content: '您修改了通信层安全加密开关，系统将重载页面以重建安全隧道连接。',
                            onOk: () => {
                                window.location.reload();
                            }
                        });
                    }
                    originalConfigSnapshot = JSON.parse(JSON.stringify(configForm.value));
                } catch (e) {
                }
            };

            /**
             * 将冗长的原始流长字节计算切削成供人工识别判读查验的 MB 或 GB 数据尺度描述词缀
             * @param {number} bytes 源字节长度
             * @returns {string} 优化排版后的格式化存储量字符串
             */
            const formatSize = (bytes) => {
                if (!bytes) return '0 B';
                const k = 1024, sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            };

            /**
             * 对传输瞬发或均值的字节速度转换加上/s字根的表示处理手法
             * @param {number} bps 被运算的原始字节上传速度值
             * @returns {string} 可直观视读的网络秒速表示描述串
             */
            const formatSpeed = (bps) => formatSpeedRate(bps);

            /**
             * 格式化速率值的内置衍生功能函数引用方法
             * @param {number} bps 原始值
             * @returns {string} 后缀字符串
             */
            const formatSpeedRate = (bps) => formatSize(bps) + '/s';

            /**
             * 按照总量与完成量间的逻辑得出当前操作推进的具体小数点位百分化数据量
             * @param {number} up 成功完成量
             * @param {number} tot 应答整体总量
             * @returns {number} 转换精简至两位的数学运算结果点百分
             */
            const calculatePercent = (up, tot) => (!tot ? 0 : Number((up / tot).toFixed(2)));

            /**
             * 剖析运算以秒级计数的运行历经耗时赋予可视文本表达（包含分钟转换进位展示）
             * @param {number} sec 时长标示值
             * @returns {string} 运算拼接完毕的时间段落描绘
             */
            const formatDurationSeconds = (sec) => {
                if (!sec && sec !== 0) return '-';
                if (sec === 0) return '< 1s';
                const m = Math.floor(sec / 60);
                const s = sec % 60;
                return m > 0 ? `${m}m ${s}s` : `${s}s`;
            };

            /**
             * 系统级长时间跨度秒值分解转换为小时及分钟等高纬时间的显示解析构造法
             * @param {number} seconds 累计流转逝去时间秒钟计算标示
             * @returns {string} 合合并修整完成带标签展示文本串
             */
            const formatDuration = (seconds) => {
                const h = Math.floor(seconds / 3600), m = Math.floor((seconds % 3600) / 60);
                return `${h}h ${m}m`;
            };

            /**
             * 以本地机浏览器记录为坐标系算得对象被创生延续生存到如今共消费的绝对秒值后抛出字串返回处理
             * @param {number} startTime 活动事件起爆打点原时
             * @returns {string} 代表时分演变的展示级文本
             */
            const getElapsedTime = (startTime) => {
                if (!startTime) return '0s';
                return formatDurationSeconds(Math.floor((clientTime.value - startTime) / 1000));
            };

            /**
             * 对代码结构内定死英状态字标识匹配改用贴近系统使用的汉化文字表现功能设计模块
             * @param {string} status 底层发派出的原态值
             * @returns {string} 经本地转码化过具有亲和力汉体翻译字根
             */
            const formatStatusText = (status) => {
                if (!status) return '未知';
                const lower = String(status).toLowerCase();
                if (lower.includes('success(秒传)')) return '成功 (秒传)';
                if (lower.includes('success')) return '成功';
                if (lower.includes('fail')) return '失败';
                if (lower === 'uploading') return '处理中';
                if (lower === 'waiting') return '等待中';
                return status;
            };

            /**
             * 对各种处于操作、完成不同时段及发生异变中断的对象抛出其状态绑定的界面警示颜色的反馈系统
             * @param {string} status 等待色彩决断的原本状态字符实体
             * @returns {string} 关联于框架系统底本色彩方案集属性
             */
            const getStatusColor = (status) => {
                if (!status) return 'gray';
                const str = String(status).toLowerCase();
                if (str.includes('success')) return 'green';
                if (str.includes('fail')) return 'red';
                if (str === 'uploading') return 'arcoblue';
                return 'orange';
            };

            /**
             * 基于捕获到的异常或控制台消息类别为该信息文本划拨涂抹对应的强调展示彩带
             * @param {string} level 原生级控制台等告警抛出的错误深重级字符
             * @returns {string} 应在前端涂上的具体16制等颜色表示信息结构
             */
            const getLogLevelColor = (level) => ({
                'info': '#00b42a',
                'error': '#f53f3f',
                'warn': '#ff7d00'
            }[level] || 'var(--color-text-3)');

            /**
             * 登入认证无误系统界面唤起前做大规模初探探测信息载入准备功能，用异步推演获取后方多条基础参数总汇
             */
            const initDashboard = () => {
                fetchStatus();
                fetchQueue();
                fetchLiveTasks();
                fetchHistory();
                fetchLogs();
                fetchConfig();
                setTimeout(() => {
                    connectWS();
                }, 1000);
                if (pollingTimer) clearInterval(pollingTimer);
                pollingTimer = setInterval(() => {
                    clientTime.value = Date.now();
                }, 1000);
            };

            /**
             * 退离体系后解绑卸除销毁前端内缓存一切定时与挂靠连接及 ECharts 画布占据耗时的清除收尾总系统
             */
            const cleanUp = () => {
                if (pollingTimer) clearInterval(pollingTimer);
                if (pingTimer) clearInterval(pingTimer);
                if (ws) {
                    ws.onclose = null;
                    ws.close();
                }
                if (chartInstance) {
                    chartInstance.dispose();
                    chartInstance = null;
                }
                if (trendChartInstance) {
                    trendChartInstance.dispose();
                    trendChartInstance = null;
                }
                window.removeEventListener('resize', handleResize);
            };

            onMounted(() => {
                autoSetThemeByTime();
                if (isLoggedIn.value) {
                    initDashboard();
                    setTimeout(() => {
                        if (activeTab.value === 'overview') {
                            renderChart();
                            renderTrendChart();
                        }
                    }, 300);
                }
                window.addEventListener('keydown', handleGlobalKeydown);
                handleResize();

                document.addEventListener('visibilitychange', () => {
                    if (document.visibilityState === 'visible' && isLoggedIn.value) {
                        if (wsStatus.value === 'disconnected' || !ws || ws.readyState !== WebSocket.OPEN) {
                            connectWS();
                        } else {
                            if (window._encryptionEnabled) {
                                encryptPayload(JSON.stringify({type: 'ping', payload: Date.now()})).then(enc => {
                                    ws.send(JSON.stringify({encrypted: enc}));
                                });
                            } else {
                                ws.send(JSON.stringify({type: 'ping', payload: Date.now()}));
                            }
                        }
                    }
                });
            });

            onUnmounted(() => {
                cleanUp();
                window.removeEventListener('keydown', handleGlobalKeydown);
            });

            watch(activeTab, (newTab) => {
                if (newTab === 'logs') fetchLogs();
                if (newTab === 'history') fetchHistory();
                if (newTab === 'cookies') fetchCookies();
                if (newTab === 'streamers') {
                    fetchRecorderStatus();
                    fetchStreamers();
                    fetchActiveStreamers();
                }
                if (newTab === 'builtin_recorder') {
                    fetchBuiltinConfig();
                }
            });

            // 虚拟滚动日志定位逻辑
            watch(() => logData.items.length, () => {
                nextTick(() => {
                    if (logListRef.value) {
                        logListRef.value.scrollIntoView({ index: logData.items.length - 1 });
                    }
                });
            });

            return {
                isMobile, isDarkMode, toggleTheme, openGitHub, isLoggedIn, loginLoading, loginForm, activeTab,
                handleLogin, handleLogout, wsStatus, wsStats, wsLatency, getLatencyColor, liveTaskFilter,
                systemStatus, queueStatus, liveTasks, uploadingTasks, completedTasks, control, historyQuery,
                historyData, pagination, fetchHistory, onPageChange, onPageSizeChange, logQuery, logData,
                logExportLimit, logListRef, fetchLogs, downloadLogs, configForm, configDirsString,
                fetchConfig, saveConfig, streamers, newStreamer, activeStreamersCount, fetchStreamers,
                saveStreamers, addStreamer, removeStreamer, activeRecordingStreamers, onlineStreamersCount,
                showBatchAddModal, batchAddText, batchAddLoading, handleBatchAdd, cookiesForm, cookiesLoading,
                fetchCookies, saveCookies, radarState, recorderStatus, recorderControlLoading, showLogsModal,
                recorderLogsContent, dockerLogsRef, fetchRecorderStatus, controlRecorder, fetchRecorderLogs,
                openLogsModal, formatSize, formatSpeed, calculatePercent, formatDuration, formatDurationSeconds,
                getElapsedTime, getStatusColor, getLogLevelColor, fetchLiveTasks, formatStatusText,
                streamerSearchQuery, streamerSearchRef, filteredStreamers, trafficMetrics, statsData,
                calculateRankPercent, builtinSearchQuery, showBuiltinSettingsModal, showBuiltinBatchModal,
                builtinCurrentPage, builtinPageSize, sortedBuiltinTasks, paginatedBuiltinTasks, builtinForm,
                builtinBatchForm, builtinSettings, builtinCookies, builtinTasks, builtinActiveCount,
                builtinRecordingCount, isAllBuiltinActive, builtinAdding, builtinBatchAdding, builtinSaving,
                builtinSavingCookies, getBuiltinLiveUrl, fetchBuiltinConfig, saveBuiltinConfig, saveBuiltinCookies,
                handleAddBuiltin, handleBatchAddBuiltin, handleControlBuiltin, handleSwitchBuiltin,
                handleMasterSwitchBuiltin, openBuiltinSettingsModal, downloadBuiltinCover, globalPreview, openPreview
            };
        }
    });

    app.use(ArcoVue);
    app.use(ArcoVueIcon);
    app.mount('#app');
</script>
</body>
</html>
