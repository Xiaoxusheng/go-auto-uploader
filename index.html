<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <meta name="referrer" content="no-referrer"/>

    <title>分布式文件上传与录制系统</title>
    <link rel="icon" href="data:,"/>
    <link rel="icon"
          href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/@arco-design/web-vue/dist/arco-vue.min.js"></script>
    <script src="https://unpkg.com/@arco-design/web-vue/dist/arco-vue-icon.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/echarts/dist/echarts.min.js"></script>
    <link href="https://unpkg.com/@arco-design/web-vue/dist/arco.min.css" rel="stylesheet">

    <style>
        html, body {
            max-width: 100vw;
            overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
        }

        :root {
            --bg-base: #f0f2f5;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --nav-glass-bg: rgba(255, 255, 255, 0.90);
            --glass-border: rgba(0, 0, 0, 0.06);
            --hover-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
        }

        body[arco-theme='dark'] {
            --bg-base: #000000;
            --glass-bg: rgba(35, 35, 36, 0.65);
            --nav-glass-bg: rgba(20, 20, 20, 0.85);
            --glass-border: rgba(255, 255, 255, 0.12);
            --hover-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
        }

        body {
            background-color: var(--bg-base);
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            color: var(--color-text-1);
            transition: background-color 0.4s ease;
        }

        .apple-glass {
            background-color: var(--glass-bg) !important;
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-radius: 12px;
            transition: background-color 0.4s ease, border-color 0.4s ease;
        }

        .nav-glass {
            background-color: var(--nav-glass-bg) !important;
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .hover-effect {
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .hover-effect:hover {
            transform: translateY(-4px);
            box-shadow: var(--hover-shadow);
        }

        .fade-enter-active, .fade-leave-active {
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1), transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .fade-enter-from, .fade-leave-to {
            opacity: 0;
            transform: translateY(12px) scale(0.98);
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }

        @keyframes breathe {
            0% {
                transform: scale(0.9);
                box-shadow: 0 0 0 0 rgba(0, 180, 42, 0.4);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 12px 6px rgba(0, 180, 42, 0.15);
            }
            100% {
                transform: scale(0.9);
                box-shadow: 0 0 0 0 rgba(0, 180, 42, 0);
            }
        }

        .status-dot-connected {
            background-color: #00B42A;
            animation: breathe 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.9);
                opacity: 0.85;
            }
            50% {
                transform: scale(1.05);
                opacity: 1;
            }
            100% {
                transform: scale(0.9);
                opacity: 0.85;
            }
        }

        .status-dot-connecting {
            background-color: #165DFF;
            animation: pulse 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes flash-warning {
            0%, 100% {
                opacity: 1;
                background-color: #F53F3F;
                box-shadow: 0 0 8px rgba(245, 63, 63, 0.5);
            }
            50% {
                opacity: 0.5;
                background-color: #F53F3F;
                box-shadow: none;
            }
        }

        .status-dot-disconnected {
            background-color: #F53F3F;
            animation: flash-warning 1.5s ease-in-out infinite;
        }

        @keyframes wifi-wave {
            0% {
                opacity: 0.5;
                transform: scale(0.95);
            }
            50% {
                opacity: 1;
                transform: scale(1.05);
            }
            100% {
                opacity: 0.5;
                transform: scale(0.95);
            }
        }

        .ws-icon-connected {
            color: #00B42A !important;
            animation: wifi-wave 3.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        .ws-icon-connecting {
            color: #165DFF !important;
            animation: pulse 1.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        .ws-icon-disconnected {
            color: #F53F3F !important;
            opacity: 0.8 !important;
        }

        .ws-data-flash {
            color: #165DFF !important;
            filter: drop-shadow(0 0 14px rgba(22, 93, 255, 0.8));
            transform: scale(1.15) !important;
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1) !important;
        }

        #app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            width: 100%;
            overflow-x: hidden;
        }

        .main-container {
            padding: 24px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
            flex: 1;
        }

        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-box {
            width: 360px;
            padding: 32px;
            border: 1px solid var(--glass-border);
        }

        .arco-card {
            background: transparent !important;
            border-radius: 12px;
        }

        .arco-card-bordered {
            border: 1px solid var(--glass-border) !important;
        }

        .arco-card-header {
            border-bottom: 1px solid var(--glass-border) !important;
            padding: 12px 16px !important;
        }

        .arco-card-body {
            padding: 16px !important;
        }

        .arco-layout-content, .arco-tabs-nav::before {
            background: transparent !important;
        }

        .stat-card {
            padding: 20px;
            height: 100%;
            box-sizing: border-box;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 600;
            color: var(--color-text-1);
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .stat-label {
            font-size: 13px;
            color: var(--color-text-3);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .action-bar {
            margin-bottom: 16px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .log-container {
            padding: 16px;
            height: 420px;
            overflow-y: auto;
            font-family: 'SF Mono', Consolas, Menlo, monospace;
            font-size: 13px;
            border-radius: 12px;
            scroll-behavior: smooth;
            border: 1px solid var(--glass-border);
        }

        .docker-logs {
            background: #1e1e1e;
            color: #a9b7c6;
            font-family: 'Consolas', monospace;
            padding: 16px;
            border-radius: 8px;
            white-space: pre-wrap;
            overflow-y: auto;
            height: 500px;
            font-size: 13px;
        }

        .download-btn {
            background-color: var(--color-primary-light-1);
            color: var(--color-primary-6);
            border: 1px solid var(--color-primary-light-3);
        }

        .footer-copyright {
            text-align: center;
            padding: 16px 24px;
            font-size: 12px;
            color: var(--color-text-3);
        }

        .footer-copyright a {
            color: var(--color-text-3);
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-copyright a:hover {
            color: var(--color-primary-light-4);
        }

        .arco-table-bordered .arco-table-container {
            border-left: 1px solid var(--glass-border) !important;
            border-top: 1px solid var(--glass-border) !important;
        }

        .arco-table-bordered .arco-table-th, .arco-table-bordered .arco-table-td {
            border-right: 1px solid var(--glass-border) !important;
            border-bottom: 1px solid var(--glass-border) !important;
        }

        .builtin-status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            background-color: #c9cdd4;
        }

        .builtin-status-dot.is-recording {
            background-color: #00b42a;
            box-shadow: 0 0 6px rgba(0, 180, 42, 0.4);
        }

        .cover-download-btn {
            position: absolute;
            bottom: 4px;
            right: 4px;
            z-index: 10;
            background-color: rgba(0, 0, 0, 0.6) !important;
            color: white !important;
            border: none;
            width: 24px;
            height: 24px;
            display: none;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
        }

        .cover-download-btn:hover {
            background-color: #165DFF !important;
            transform: scale(1.1);
        }

        .image-wrapper:hover .cover-download-btn {
            display: inline-flex;
        }

        @supports (-webkit-touch-callout: none) {
            * {
                -webkit-tap-highlight-color: transparent;
            }
        }

        @media screen and (max-width: 768px) {
            .main-container {
                padding: 12px 8px env(safe-area-inset-bottom) env(safe-area-inset-left) !important;
                width: 100vw;
                overflow: hidden;
            }

            .stat-value {
                font-size: 18px;
            }

            .login-box {
                width: 90%;
                padding: 24px;
            }

            .arco-tabs-nav-type-rounded .arco-tabs-tab {
                padding: 4px 12px;
                font-size: 13px;
            }

            .arco-input, .arco-textarea, .arco-select-view-value {
                font-size: 16px !important;
            }

            header.nav-glass {
                padding: calc(env(safe-area-inset-top) + 8px) 12px 8px 12px !important;
                flex-direction: column !important;
                align-items: flex-start !important;
                gap: 12px;
            }

            .nav-title {
                width: 100%;
                display: flex;
                flex-wrap: wrap;
                line-height: 1.4;
                gap: 6px;
                font-size: 14px !important;
            }

            .nav-title .arco-tag {
                margin-top: 2px;
            }

            header.nav-glass .arco-space {
                width: 100%;
                justify-content: space-between;
            }

            .hidden-xs {
                display: none !important;
            }

            .arco-card, .arco-tabs, .arco-table-container, .arco-row, .arco-col, .arco-card-body, .arco-tabs-content {
                min-width: 0 !important;
                max-width: 100%;
            }

            .arco-card-body {
                padding: 12px !important;
            }

            .arco-card {
                height: auto !important;
                min-height: 120px;
            }

            .action-bar {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
            }

            .action-bar .arco-btn, .action-bar .arco-radio-group {
                flex: 1 1 calc(50% - 8px);
                margin: 0;
                display: flex;
                justify-content: center;
            }

            .action-bar .arco-btn[status="danger"], .action-bar .arco-select {
                flex: 1 1 100%;
            }

            .search-control-bar {
                display: flex;
                flex-direction: column !important;
                align-items: stretch !important;
                gap: 10px !important;
                width: 100%;
            }

            .search-control-bar > * {
                width: 100% !important;
                min-width: 0 !important;
                margin: 0 !important;
                box-sizing: border-box;
            }

            .search-control-bar .arco-input-group {
                width: 100% !important;
                display: flex;
                border-radius: 4px;
                box-sizing: border-box;
            }

            .search-control-bar .arco-input-group > .arco-select {
                flex: 0 0 100px !important;
                width: 100px !important;
            }

            .search-control-bar .arco-input-group > .arco-input-wrapper {
                flex: 1 !important;
                min-width: 0 !important;
            }

            .search-control-bar .arco-divider-vertical {
                display: none;
            }

            .streamer-inputs {
                flex-direction: column !important;
                gap: 8px !important;
                width: 100% !important;
                box-sizing: border-box;
            }

            .streamer-inputs > * {
                width: 100% !important;
                box-sizing: border-box;
            }

            .mobile-action-buttons {
                display: flex;
                flex-direction: row !important;
                gap: 8px;
                width: 100%;
                flex-wrap: wrap;
                box-sizing: border-box;
            }

            .mobile-action-buttons > * {
                flex: 1 1 calc(50% - 4px);
                margin: 0 !important;
                box-sizing: border-box;
            }

            .arco-modal {
                width: 92vw !important;
                max-width: 92vw !important;
            }

            .cover-download-btn {
                display: inline-flex;
            }
        }
    </style>
</head>
<body>
<div id="app">
    <div v-if="!isLoggedIn" class="login-wrapper">
        <div class="apple-glass login-box hover-effect">
            <h2 style="text-align: center; margin-bottom: 24px; font-weight: 500;">
                <icon-safe></icon-safe>
                系统登录
            </h2>
            <a-form :model="loginForm" layout="vertical" @submit="handleLogin">
                <a-form-item field="username" label="用户名">
                    <a-input v-model="loginForm.username" size="medium">
                        <template #prefix>
                            <icon-user></icon-user>
                        </template>
                    </a-input>
                </a-form-item>
                <a-form-item field="password" label="密码">
                    <a-input-password v-model="loginForm.password" size="medium">
                        <template #prefix>
                            <icon-lock></icon-lock>
                        </template>
                    </a-input-password>
                </a-form-item>
                <a-button type="primary" html-type="submit" long size="medium" :loading="loginLoading"
                          style="border-radius: 8px; margin-top: 12px;">
                    <template #icon>
                        <icon-login></icon-login>
                    </template>
                    进入控制台
                </a-button>
            </a-form>
            <div class="footer-copyright" style="margin-top: 20px; padding: 0;">
                &copy; 2026 Lei. <br>
                <a href="https://github.com/Xiaoxusheng/go-auto-uploader" target="_blank">
                    <icon-github></icon-github>
                    go-auto-uploader
                </a>
            </div>
        </div>
    </div>

    <template v-else>
        <header class="nav-glass"
                style="padding: 12px 24px; display: flex; justify-content: space-between; align-items: center;">
            <div class="nav-title"
                 style="font-weight: 600; font-size: 16px; display: flex; align-items: center; gap: 8px;">
                <span style="display:flex; align-items:center; gap:6px;">
                    <icon-cloud style="color: var(--color-primary-light-4); font-size: 20px;"></icon-cloud>分布式文件上传与录制系统
                </span>

                <a-tag :color="systemStatus.running ? 'green' : 'red'" size="small" style="border-radius: 4px;">
                    <template #icon>
                        <icon-check-circle v-if="systemStatus.running"></icon-check-circle>
                        <icon-minus-circle v-else></icon-minus-circle>
                    </template>
                    {{ systemStatus.running ? '上传引擎运行中' : '上传引擎已挂起' }}
                </a-tag>
            </div>

            <a-space size="medium">
                <span style="font-size: 12px; color: var(--color-text-3); display: flex; align-items: center; gap: 4px; margin-right: 8px;">
                    <icon-dashboard></icon-dashboard> <span class="hidden-xs">Uptime:</span> {{ formatDuration(systemStatus.uptime) }}
                </span>
                <a-button type="text" shape="circle" size="small" @click="openGitHub">
                    <icon-github style="font-size: 16px; color: var(--color-text-2);"></icon-github>
                </a-button>
                <a-button type="text" shape="circle" size="small" @click="toggleTheme">
                    <icon-sun-fill v-if="!isDarkMode"
                                   style="font-size: 16px; color: var(--color-text-2);"></icon-sun-fill>
                    <icon-moon-fill v-else style="font-size: 16px; color: var(--color-text-2);"></icon-moon-fill>
                </a-button>
                <a-button type="text" status="danger" size="small" @click="handleLogout">
                    <template #icon>
                        <icon-poweroff></icon-poweroff>
                    </template>
                    退出
                </a-button>
            </a-space>
        </header>

        <main class="main-container">
            <a-tabs v-model:active-key="activeTab" type="rounded" size="small" class="apple-glass"
                    style="padding: 16px; border-radius: 12px; border: 1px solid var(--glass-border);">

                <a-tab-pane key="overview">
                    <template #title>
                        <icon-apps></icon-apps>
                        <span class="hidden-xs">系统</span>概览
                    </template>

                    <div class="action-bar" style="margin-top: 8px;">
                        <a-button type="primary" status="success" size="medium" @click="control('start')"
                                  :disabled="systemStatus.running">
                            <template #icon>
                                <icon-play-arrow></icon-play-arrow>
                            </template>
                            启动扫描<span class="hidden-xs">上传</span>
                        </a-button>
                        <a-button type="primary" status="warning" size="medium" @click="control('pause')"
                                  :disabled="!systemStatus.running">
                            <template #icon>
                                <icon-pause></icon-pause>
                            </template>
                            暂停扫描<span class="hidden-xs">上传</span>
                        </a-button>
                        <a-button type="outline" size="medium" @click="control('rescan')">
                            <template #icon>
                                <icon-refresh></icon-refresh>
                            </template>
                            手动重扫
                        </a-button>
                        <a-button type="outline" size="medium" @click="control('relogin')">
                            <template #icon>
                                <icon-robot></icon-robot>
                            </template>
                            刷新授权
                        </a-button>
                    </div>

                    <a-row :gutter="[16, 16]" style="margin-bottom: 16px;">
                        <a-col :xs="24" :lg="16">
                            <a-card class="apple-glass hover-effect" bordered style="height: 380px;">
                                <template #title>
                                    <div style="display:flex; justify-content: space-between; align-items:center;">
                                        <div style="display:flex; align-items:center; gap:8px;">
                                            <icon-common style="color: #165DFF"></icon-common>
                                            <span class="hidden-xs">全站流量与文件增长趋势 (近7日)</span>
                                            <span v-if="isMobile">趋势(近7日)</span>
                                        </div>
                                        <div style="font-size: 13px; color: var(--color-text-3); display: flex; align-items: center; gap: 6px;">
                                            <icon-swap style="color: #165DFF;"></icon-swap>
                                            <span class="hidden-xs">瞬时网络上行:</span>
                                            <span style="color: #165DFF; font-weight: bold; font-family: monospace; font-size: 15px;">
                                                {{ formatSpeed(trafficMetrics.speed) }}
                                            </span>
                                        </div>
                                    </div>
                                </template>
                                <div id="trendChart" style="height: 300px; width: 100%;"></div>
                            </a-card>
                        </a-col>

                        <a-col :xs="24" :lg="8">
                            <a-card class="apple-glass hover-effect" bordered style="height: 380px;">
                                <template #title>
                                    <div style="display:flex; align-items:center; gap:8px;">
                                        <icon-fire style="color: #F53F3F"></icon-fire>
                                        <span>硬盘空间消耗排行 (TOP 5)</span>
                                    </div>
                                </template>
                                <div style="padding: 10px 0;">
                                    <div v-for="(item, idx) in statsData.rank" :key="idx" style="margin-bottom: 20px;">
                                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px;">
                                            <span style="font-weight: 500;">{{ idx + 1 }}. {{ item.name }}</span>
                                            <span style="color: var(--color-text-3);">{{ item.size.toFixed(2) }} GB</span>
                                        </div>
                                        <a-progress
                                                :percent="calculateRankPercent(item.size)"
                                                :color="idx === 0 ? '#F53F3F' : '#165DFF'"
                                                size="medium" :show-text="false" style="height: 8px;"
                                        ></a-progress>
                                    </div>
                                    <div v-if="!statsData.rank || statsData.rank.length === 0"
                                         style="text-align: center; color: var(--color-text-4); margin-top: 80px;">
                                        <icon-empty style="font-size: 40px;"></icon-empty>
                                        <p>暂无上传数据记录</p>
                                    </div>
                                </div>
                            </a-card>
                        </a-col>
                    </a-row>

                    <a-row :gutter="[16, 16]">
                        <a-col :xs="24" :md="16">
                            <a-row :gutter="[16, 16]">
                                <a-col :xs="12" :sm="4">
                                    <a-card class="apple-glass" hoverable bordered>
                                        <div class="stat-label">
                                            <icon-list></icon-list>
                                            等待队列
                                        </div>
                                        <div class="stat-value" style="color: #F5A623;">{{ queueStatus.waiting || 0 }}
                                        </div>
                                    </a-card>
                                </a-col>
                                <a-col :xs="12" :sm="4">
                                    <a-card class="apple-glass" hoverable bordered>
                                        <div class="stat-label">
                                            <icon-cloud-upload></icon-cloud-upload>
                                            上传中
                                        </div>
                                        <div class="stat-value" style="color: #165DFF;">{{ queueStatus.uploading || 0
                                            }}
                                        </div>
                                    </a-card>
                                </a-col>
                                <a-col :xs="12" :sm="4">
                                    <a-card class="apple-glass" hoverable bordered>
                                        <div class="stat-label">
                                            <icon-check-circle></icon-check-circle>
                                            成功队列
                                        </div>
                                        <div class="stat-value" style="color: #00B42A;">{{ queueStatus.success || 0 }}
                                        </div>
                                    </a-card>
                                </a-col>
                                <a-col :xs="12" :sm="4">
                                    <a-card class="apple-glass" hoverable bordered>
                                        <div class="stat-label">
                                            <icon-close-circle></icon-close-circle>

<script>
    let _cryptoKey = null;
    let _sessionId = null;
    let _aesKeyBytes = null;
    let securityPromise = null;

    /**
     * 解析并导入后端传来的 RSA 公钥 (SPKI 格式)
     * @param {string} base64Key Base64编码的RSA公钥
     * @returns {Promise<CryptoKey>} 返回可用于加密的 Web Crypto API 密钥对象
     */
    async function importRSAPublicKey(base64Key) {
        const binaryDer = window.atob(base64Key);
        const bytes = new Uint8Array(binaryDer.length);
        for (let i = 0; i < binaryDer.length; i++) {
            bytes[i] = binaryDer.charCodeAt(i);
        }
        return await crypto.subtle.importKey(
            "spki",
            bytes.buffer,
            {name: "RSA-OAEP", hash: "SHA-256"},
            false,
            ["encrypt"]
        );
    }

    /**
     * 核心安全初始化：与服务端进行非对称握手并申请专属 AES 加密隧道
     * @returns {Promise<void>} 握手完成的 Promise 信号
     */
    async function initSecurity() {
        if (securityPromise) return securityPromise;
        securityPromise = (async () => {
            try {
                // 1. 从服务器拉取随机生成的 RSA 公钥
                const res = await fetch('/api/v1/sec/pubkey');
                const pubKeyData = await res.json();

                // 将后端返回的 enabled 状态保存到前端全局变量
                window._encryptionEnabled = pubKeyData.data.enabled;

                if (!window._encryptionEnabled) {
                    console.log("🔓 [SEC] 后端已关闭传输加密，切换为明文直连模式");
                    _sessionId = "plaintext-" + Date.now();
                    return;
                }

                const rsaPubKey = await importRSAPublicKey(pubKeyData.data.pubkey);

                // 2. 在浏览器本地随机生成 32 字节的高强度 AES-256 密钥
                _aesKeyBytes = crypto.getRandomValues(new Uint8Array(32));
                _cryptoKey = await crypto.subtle.importKey("raw", _aesKeyBytes, {name: "AES-GCM"}, false, ["encrypt", "decrypt"]);

                // 3. 使用 RSA-OAEP 公钥加密该 AES 密钥
                const encryptedAesKeyBuf = await crypto.subtle.encrypt({name: "RSA-OAEP"}, rsaPubKey, _aesKeyBytes);
                const encryptedAesKeyB64 = window.btoa(String.fromCharCode(...new Uint8Array(encryptedAesKeyBuf)));

                // 4. 将加密后的 AES 密钥发送给后端，换取本会话独有的 Session ID
                const exRes = await fetch('/api/v1/sec/exchange', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({enc_key: encryptedAesKeyB64})
                });
                const exData = await exRes.json();
                _sessionId = exData.data.session_id;
                console.log("🛡️ [SEC] RSA+AES 动态密钥安全隧道建立完成!");
            } catch (e) {
                console.error("安全隧道建立失败:", e);
                ArcoVue.Message.error('无法建立安全通信信道，请刷新页面重试');
            }
        })();
        return securityPromise;
    }

    /**
     * 获取 AES 密钥，若未初始化隧道则自动触发安全握手协议
     * @returns {Promise<CryptoKey|null>} 会话专属 AES 密钥
     */
    async function getCryptoKey() {
        if (!_cryptoKey && window._encryptionEnabled) await initSecurity();
        return _cryptoKey;
    }

    /**
     * AES-256-GCM 动态载荷加密函数：生成密文供网络层安全传输
     * @param {string} plaintext 准备加密的明文 JSON 字符串
     * @returns {Promise<string>} Base64 编码的密文结果
     */
    async function encryptPayload(plaintext) {
        const key = await getCryptoKey();
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const encoded = new TextEncoder().encode(plaintext);
        const ciphertextBuffer = await crypto.subtle.encrypt({name: "AES-GCM", iv: iv}, key, encoded);
        const ciphertext = new Uint8Array(ciphertextBuffer);
        const combined = new Uint8Array(iv.length + ciphertext.length);
        combined.set(iv);
        combined.set(ciphertext, iv.length);

        let binary = '';
        for (let i = 0; i < combined.byteLength; i++) {
            binary += String.fromCharCode(combined[i]);
        }
        return window.btoa(binary);
    }

    /**
     * AES-256-GCM 动态载荷解密函数：对服务端下发的加密报文进行解密
     * @param {string} base64Str Base64 编码的密文载荷
     * @returns {Promise<string>} 解密后的原始明文字符串
     */
    async function decryptPayload(base64Str) {
        const key = await getCryptoKey();
        const binary = window.atob(base64Str);
        const combined = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i++) {
            combined[i] = binary.charCodeAt(i);
        }
        const iv = combined.slice(0, 12);
        const ciphertext = combined.slice(12);
        const decryptedBuffer = await crypto.subtle.decrypt({name: "AES-GCM", iv: iv}, key, ciphertext);
        return new TextDecoder().decode(decryptedBuffer);
    }
</script>

<script>
    const {createApp, ref, reactive, onMounted, onUnmounted, computed, watch, nextTick} = Vue;
    const {Message, Modal, Notification} = ArcoVue;

    const api = axios.create({baseURL: '/api/v1', timeout: 10000});

    /**
     * Axios 响应拦截器：自动拦截后端报文，触发专属 AES 密钥解密，并统一下发错误反馈
     */
    api.interceptors.response.use(
        async res => {
            let data = res.data;
            if (window._encryptionEnabled && data && data.encrypted) {
                try {
                    const decryptedStr = await decryptPayload(data.encrypted);
                    data = JSON.parse(decryptedStr);
                } catch (e) {
                    Message.error('动态解密失败，数据可能被劫持或密钥过期');
                    return Promise.reject(new Error('Decrypt failed'));
                }
            }
            if (data.code !== 200) {
                // 如果后端告知 Session 不合法/过期，清空重连
                if (data.code === 401 && data.message === 'Session Invalid') {
                    _sessionId = null;
                    _cryptoKey = null;
                    securityPromise = null;
                    window.location.reload();
                }
                Message.error(data.message || '请求失败');
                return Promise.reject(new Error(data.message));
            }
            return data;
        },
        async err => {
            if (err.response && err.response.status === 401) {
                if (err.response.data && err.response.data.message === 'Session Invalid') {
                    _sessionId = null;
                    _cryptoKey = null;
                    securityPromise = null;
                } else {
                    localStorage.removeItem('upload_system_token');
                }
                window.location.reload();
            }
            if (window._encryptionEnabled && err.response && err.response.data && err.response.data.encrypted) {
                try {
                    const decryptedStr = await decryptPayload(err.response.data.encrypted);
                    err.response.data = JSON.parse(decryptedStr);
                } catch (e) {
                }
            }
            Message.error(err.response?.data?.message || err.message || '网络错误');
            return Promise.reject(err);
        }
    );

    /**
     * Axios 请求拦截器：确保握手完成后携带专属 SessionID，并自动对载荷进行安全封装密文
     */
    api.interceptors.request.use(async config => {
        if (!_sessionId) await initSecurity();
        config.headers['X-Session-Id'] = _sessionId;

        const token = localStorage.getItem('upload_system_token');
        if (token) config.headers['Authorization'] = `Bearer ${token}`;

        if (config.data && !(config.data instanceof FormData)) {
            if (window._encryptionEnabled) {
                const rawJson = JSON.stringify(config.data);
                const encryptedStr = await encryptPayload(rawJson);
                config.data = {encrypted: encryptedStr};
                config.headers['X-Encryption-Mode'] = 'AES-256-GCM';
            } else {
                config.headers['X-Encryption-Mode'] = 'Plaintext';
            }
        }
        return config;
    });

    const app = createApp({
        setup() {
            const isMobile = ref(window.innerWidth <= 768);

            /**
             * 处理浏览器窗口大小变化，适配响应式布局开关
             */
            const handleResize = () => {
                isMobile.value = window.innerWidth <= 768;
            };

            const isDarkMode = ref(false);

            /**
             * 根据系统时间或本地存储的用户偏好设置，自动推断并配置当前页面的暗黑/明亮主题
             */
            const autoSetThemeByTime = () => {
                const savedTheme = localStorage.getItem('upload_system_theme');
                if (savedTheme !== null) {
                    isDarkMode.value = savedTheme === 'dark';
                } else {
                    const hour = new Date().getHours();
                    isDarkMode.value = (hour < 8 || hour >= 18);
                }
                applyTheme();
            };

            /**
             * 响应用户点击动作，切换页面主题模式并持久化存储，随后强制刷新图表色彩
             */
            const toggleTheme = () => {
                isDarkMode.value = !isDarkMode.value;
                localStorage.setItem('upload_system_theme', isDarkMode.value ? 'dark' : 'light');

                applyTheme();
                setTimeout(() => {
                    renderChart();
                    renderTrendChart();
                }, 100);
            };

            /**
             * 对 Body 标签施加 Arco Vue 规范的主题属性以生效 CSS 变量
             */
            const applyTheme = () => {
                document.body.setAttribute('arco-theme', isDarkMode.value ? 'dark' : '');
            };

            /**
             * 打开底层的开源支持 GitHub 项目地址
             */
            const openGitHub = () => {
                window.open('https://github.com/Xiaoxusheng/go-auto-uploader', '_blank');
            };

            const isLoggedIn = ref(!!localStorage.getItem('upload_system_token'));
            const loginLoading = ref(false);
            const activeTab = ref('overview');

            const wsStatus = ref('connecting');
            const wsStats = reactive({msgCount: 0, lastEvent: '-', pulse: false});
            let wsPulseTimeout = null;

            const wsLatency = ref(0);
            let pingTimer = null;
            let lastPongTime = Date.now();

            /**
             * 根据 WebSocket 的 PING 心跳延迟返回对应视觉警告色
             * @param {number} ms 延迟的毫秒数
             * @returns {string} 色彩代码
             */
            const getLatencyColor = (ms) => {
                if (ms === 0) return 'var(--color-text-3)';
                if (ms <= 50) return '#00B42A';
                if (ms <= 150) return '#FF7D00';
                return '#F53F3F';
            };

            const liveTaskFilter = ref('uploading');
            let pollingTimer = null;
            let ws = null;

            const loginForm = reactive({username: 'admin', password: 'admin', otp: ''});

            const systemStatus = reactive({
                running: false,
                uptime: 0,
                workers: 0,
                rate: 0,
                dirs: [],
                dynamicInterval: 0,
                nextScanTime: 0,
                scanningInterval: 0,
                diskFree: 0,
                ffmpegMem: 0
            });
            const queueStatus = reactive({waiting: 0, uploading: 0, success: 0, failed: 0, retrying: 0});
            const trafficMetrics = reactive({speed: 0, time: 0});
            const statsData = reactive({trend: [], rank: []});
            let trendChartInstance = null;
            window.lastStatsStr = '';

            const liveTasks = ref([]);
            const clientTime = ref(Date.now());
            const streamers = ref([]);
            const newStreamer = reactive({url: '', name: ''});
            const activeStreamersCount = computed(() => streamers.value.filter(s => s.active).length);
            const isSavingStreamers = ref(false);
            const streamerSearchQuery = ref('');
            const streamerSearchRef = ref(null);
            const activeRecordingStreamers = ref([]);

            const onlineStreamersCount = computed(() => {
                return streamers.value.filter(s => activeRecordingStreamers.value.includes(s.name) && s.active).length;
            });

            const filteredStreamers = computed(() => {
                try {
                    let list = [...(streamers.value || [])];
                    if (streamerSearchQuery.value) {
                        const lower = String(streamerSearchQuery.value || '').trim().toLowerCase();
                        if (lower) {
                            list = list.filter(s =>
                                (s && s.name && String(s.name).toLowerCase().includes(lower)) ||
                                (s && s.url && String(s.url).toLowerCase().includes(lower))
                            );
                        }
                    }

                    const activeList = Array.isArray(activeRecordingStreamers.value) ? activeRecordingStreamers.value : [];

                    return list.sort((a, b) => {
                        const aOnline = a && a.name && activeList.includes(a.name) && a.active;
                        const bOnline = b && b.name && activeList.includes(b.name) && b.active;
                        if (aOnline && !bOnline) return -1;
                        if (!aOnline && bOnline) return 1;
                        if (a && b && a.active && !b.active) return -1;
                        if (a && b && !a.active && b.active) return 1;
                        return 0;
                    });
                } catch (e) {
                    console.error("外部引擎搜索/排序错误:", e);

            const globalPreview = reactive({visible: false, src: '', roomId: '', platform: ''});
