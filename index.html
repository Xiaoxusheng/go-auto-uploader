<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>直播录制文件上传系统面板</title>
    <link rel="icon" href="data:,">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://unpkg.com/@arco-design/web-vue/dist/arco-vue.min.js"></script>
    <script src="https://unpkg.com/@arco-design/web-vue/dist/arco-vue-icon.min.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <script src="https://unpkg.com/echarts/dist/echarts.min.js"></script>
    <link href="https://unpkg.com/@arco-design/web-vue/dist/arco.min.css" rel="stylesheet">

    <style>
        :root {
            --bg-base: #f0f2f5;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --nav-glass-bg: rgba(255, 255, 255, 0.90);
            --glass-border: rgba(0, 0, 0, 0.06);
            --hover-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        body[arco-theme='dark'] {
            --bg-base: #000000;
            --glass-bg: rgba(35, 35, 36, 0.65);
            --nav-glass-bg: rgba(20, 20, 20, 0.85);
            --glass-border: rgba(255, 255, 255, 0.12);
            --hover-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        body {
            background-color: var(--bg-base); margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            color: var(--color-text-1); transition: background-color 0.3s ease;
        }

        .apple-glass {
            background-color: var(--glass-bg) !important;
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-radius: 12px;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .nav-glass {
            background-color: var(--nav-glass-bg) !important;
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--glass-border);
            position: sticky; top: 0; z-index: 1000;
        }

        .hover-effect {
            transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .hover-effect:hover {
            transform: translateY(-4px);
            box-shadow: var(--hover-shadow);
        }

        .fade-enter-active, .fade-leave-active { transition: opacity 0.3s ease, transform 0.3s ease; }
        .fade-enter-from, .fade-leave-to { opacity: 0; transform: translateY(10px); }

        .status-indicator { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }

        @keyframes breathe {
            0% { transform: scale(0.85); box-shadow: 0 0 0 0 rgba(0, 180, 42, 0.7); }
            50% { transform: scale(1.1); box-shadow: 0 0 10px 4px rgba(0, 180, 42, 0.3); }
            100% { transform: scale(0.85); box-shadow: 0 0 0 0 rgba(0, 180, 42, 0); }
        }
        .status-dot-connected { background-color: #00B42A; animation: breathe 2.5s infinite ease-in-out; }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.8; }
        }
        .status-dot-connecting { background-color: #165DFF; animation: pulse 1s infinite; }

        @keyframes flash-warning {
            0%, 100% { opacity: 1; background-color: #F53F3F; box-shadow: 0 0 8px #F53F3F; }
            50% { opacity: 0.4; background-color: #F53F3F; box-shadow: none; }
        }
        .status-dot-disconnected { background-color: #F53F3F; animation: flash-warning 1s infinite; }

        @keyframes wifi-wave {
            0% { opacity: 0.4; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0.4; transform: scale(0.95); }
        }
        .ws-icon-connected { color: #00B42A !important; animation: wifi-wave 3s infinite ease-in-out; }
        .ws-icon-connecting { color: #165DFF !important; animation: pulse 1s infinite; }
        .ws-icon-disconnected { color: #F53F3F !important; opacity: 0.8 !important; }

        .ws-data-flash { color: #165DFF !important; filter: drop-shadow(0 0 12px rgba(22, 93, 255, 0.9)); transform: scale(1.15) !important; transition: all 0.05s ease-out !important; }

        #app { min-height: 100vh; display: flex; flex-direction: column; }
        .main-container { padding: 24px; max-width: 1400px; margin: 0 auto; width: 100%; box-sizing: border-box; flex: 1; }
        .login-wrapper { display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box { width: 360px; padding: 32px; border: 1px solid var(--glass-border); }

        .arco-card { background: transparent !important; border-radius: 12px; }
        .arco-card-bordered { border: 1px solid var(--glass-border) !important; }
        .arco-card-header { border-bottom: 1px solid var(--glass-border) !important; padding: 12px 16px !important;}
        .arco-card-body { padding: 16px !important; }
        .arco-layout-content, .arco-tabs-nav::before { background: transparent !important; }

        .stat-card { padding: 20px; height: 100%; box-sizing: border-box; }
        .stat-value { font-size: 26px; font-weight: 600; color: var(--color-text-1); margin-top: 10px; display: flex; align-items: center; gap: 8px; }
        .stat-label { font-size: 13px; color: var(--color-text-3); display: flex; align-items: center; gap: 6px; }
        .action-bar { margin-bottom: 16px; display: flex; gap: 8px; flex-wrap: wrap; }

        .log-container { padding: 16px; height: 420px; overflow-y: auto; font-family: 'SF Mono', Consolas, Menlo, monospace; font-size: 13px; border-radius: 12px; scroll-behavior: smooth; border: 1px solid var(--glass-border); }
        .docker-logs { background: #1e1e1e; color: #a9b7c6; font-family: 'Consolas', monospace; padding: 16px; border-radius: 8px; white-space: pre-wrap; overflow-y: auto; height: 500px; font-size: 13px; }

        .download-btn { background-color: var(--color-primary-light-1); color: var(--color-primary-6); border: 1px solid var(--color-primary-light-3); }
        .footer-copyright { text-align: center; padding: 16px 24px; font-size: 12px; color: var(--color-text-3); }
        .footer-copyright a { color: var(--color-text-3); text-decoration: none; transition: color 0.3s; }
        .footer-copyright a:hover { color: var(--color-primary-light-4); }

        .arco-table-bordered .arco-table-container { border-left: 1px solid var(--glass-border) !important; border-top: 1px solid var(--glass-border) !important; }
        .arco-table-bordered .arco-table-th, .arco-table-bordered .arco-table-td { border-right: 1px solid var(--glass-border) !important; border-bottom: 1px solid var(--glass-border) !important; }

        @media screen and (max-width: 768px) {
            .main-container { padding: 12px 8px; }
            .stat-value { font-size: 20px; }
            .action-bar { display: flex; flex-wrap: wrap; gap: 8px; }
            .action-bar .arco-btn { flex: 1 1 calc(50% - 8px); margin: 0; display: flex; justify-content: center; }
            .action-bar .arco-btn[status="danger"] { flex: 1 1 100%; }
            .login-box { width: 90%; padding: 24px; }
            .arco-tabs-nav-type-rounded .arco-tabs-tab { padding: 4px 12px; font-size: 13px; }
            header.nav-glass { flex-wrap: wrap; padding: 12px 16px !important; }
            .nav-title { width: 100%; justify-content: space-between; margin-bottom: 8px; font-size: 15px !important;}
            .hidden-xs { display: none !important; }
        }
    </style>
</head>
<body>
<div id="app">
    <div v-if="!isLoggedIn" class="login-wrapper">
        <div class="apple-glass login-box hover-effect">
            <h2 style="text-align: center; margin-bottom: 24px; font-weight: 500;">
                <icon-safe></icon-safe> 系统登录
            </h2>
            <a-form :model="loginForm" layout="vertical" @submit="handleLogin">
                <a-form-item field="username" label="用户名">
                    <a-input v-model="loginForm.username" size="medium"><template #prefix><icon-user></icon-user></template></a-input>
                </a-form-item>
                <a-form-item field="password" label="密码">
                    <a-input-password v-model="loginForm.password" size="medium"><template #prefix><icon-lock></icon-lock></template></a-input-password>
                </a-form-item>
                <a-button type="primary" html-type="submit" long size="medium" :loading="loginLoading" style="border-radius: 8px; margin-top: 12px;">
                    <template #icon><icon-login></icon-login></template> 进入控制台
                </a-button>
            </a-form>
            <div class="footer-copyright" style="margin-top: 20px; padding: 0;">
                &copy; 2026 Lei. <br>
                <a href="https://github.com/Xiaoxusheng/go-auto-uploader" target="_blank">
                    <icon-github></icon-github> go-auto-uploader
                </a>
            </div>
        </div>
    </div>

    <template v-else>
        <header class="nav-glass" style="padding: 12px 24px; display: flex; justify-content: space-between; align-items: center;">
            <div class="nav-title" style="font-weight: 600; font-size: 16px; display: flex; align-items: center; gap: 8px;">
                <span style="display:flex; align-items:center; gap:6px;">
                    <icon-cloud style="color: var(--color-primary-light-4); font-size: 20px;"></icon-cloud>直播录制文件上传系统
                </span>

                <a-tag :color="systemStatus.running ? 'green' : 'red'" size="small" style="border-radius: 4px;">
                    <template #icon><icon-check-circle v-if="systemStatus.running"></icon-check-circle><icon-minus-circle v-else></icon-minus-circle></template>
                    {{ systemStatus.running ? '运行中' : '已暂停' }}
                </a-tag>
            </div>

            <a-space size="medium">
                <span style="font-size: 12px; color: var(--color-text-3); display: flex; align-items: center; gap: 4px; margin-right: 8px;">
                    <icon-dashboard></icon-dashboard> Uptime: {{ formatDuration(systemStatus.uptime) }}
                </span>
                <a-button type="text" shape="circle" size="small" @click="openGitHub">
                    <icon-github style="font-size: 16px; color: var(--color-text-2);"></icon-github>
                </a-button>
                <a-button type="text" shape="circle" size="small" @click="toggleTheme">
                    <icon-sun-fill v-if="!isDarkMode" style="font-size: 16px; color: var(--color-text-2);"></icon-sun-fill>
                    <icon-moon-fill v-else style="font-size: 16px; color: var(--color-text-2);"></icon-moon-fill>
                </a-button>
                <a-button type="text" status="danger" size="small" @click="handleLogout">
                    <template #icon><icon-poweroff></icon-poweroff></template> 退出
                </a-button>
            </a-space>
        </header>

        <main class="main-container">
            <a-tabs v-model:active-key="activeTab" type="rounded" size="small" class="apple-glass" style="padding: 16px; border-radius: 12px; border: 1px solid var(--glass-border);">

                <a-tab-pane key="overview">
                    <template #title><icon-apps></icon-apps> 系统概览</template>

                    <div class="action-bar" style="margin-top: 8px;">
                        <a-button type="primary" status="success" size="medium" @click="control('start')" :disabled="systemStatus.running">
                            <template #icon><icon-play-arrow></icon-play-arrow></template> 启动扫描
                        </a-button>
                        <a-button type="primary" status="warning" size="medium" @click="control('pause')" :disabled="!systemStatus.running">
                            <template #icon><icon-pause></icon-pause></template> 暂停任务
                        </a-button>
                        <a-button type="outline" status="danger" size="medium" @click="control('stop')">
                            <template #icon><icon-stop></icon-stop></template> 停止系统
                        </a-button>
                        <a-button type="outline" size="medium" @click="control('rescan')">
                            <template #icon><icon-refresh></icon-refresh></template> 手动重扫
                        </a-button>
                        <a-button type="outline" size="medium" @click="control('relogin')">
                            <template #icon><icon-robot></icon-robot></template> 刷新远端授权
                        </a-button>
                    </div>

                    <a-row :gutter="[16, 16]" style="margin-bottom: 16px;">
                        <a-col :xs="24" :lg="16">
                            <a-card class="apple-glass hover-effect" bordered style="height: 380px;">
                                <template #title>
                                    <div style="display:flex; justify-content: space-between; align-items:center;">
                                        <div style="display:flex; align-items:center; gap:8px;">
                                            <icon-common style="color: #165DFF"></icon-common>
                                            <span>全站流量与文件增长趋势 (近7日)</span>
                                        </div>
                                        <div style="font-size: 13px; color: var(--color-text-3); display: flex; align-items: center; gap: 6px;">
                                            <icon-swap style="color: #165DFF;"></icon-swap> 瞬时网络上行:
                                            <span style="color: #165DFF; font-weight: bold; font-family: monospace; font-size: 15px;">
                                                {{ formatSpeed(trafficMetrics.speed) }}
                                            </span>
                                        </div>
                                    </div>
                                </template>
                                <div id="trendChart" style="height: 300px; width: 100%;"></div>
                            </a-card>
                        </a-col>

                        <a-col :xs="24" :lg="8">
                            <a-card class="apple-glass hover-effect" bordered style="height: 380px;">
                                <template #title>
                                    <div style="display:flex; align-items:center; gap:8px;">
                                        <icon-fire style="color: #F53F3F"></icon-fire>
                                        <span>硬盘空间消耗排行 (TOP 5)</span>
                                    </div>
                                </template>
                                <div style="padding: 10px 0;">
                                    <div v-for="(item, idx) in statsData.rank" :key="idx" style="margin-bottom: 20px;">
                                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px;">
                                            <span style="font-weight: 500;">{{ idx + 1 }}. {{ item.name }}</span>
                                            <span style="color: var(--color-text-3);">{{ item.size.toFixed(2) }} GB</span>
                                        </div>
                                        <a-progress
                                                :percent="calculateRankPercent(item.size)"
                                                :color="idx === 0 ? '#F53F3F' : '#165DFF'"
                                                size="medium" :show-text="false" style="height: 8px;"
                                        ></a-progress>
                                    </div>
                                    <div v-if="!statsData.rank || statsData.rank.length === 0" style="text-align: center; color: var(--color-text-4); margin-top: 80px;">
                                        <icon-empty style="font-size: 40px;"></icon-empty><p>暂无上传数据记录</p>
                                    </div>
                                </div>
                            </a-card>
                        </a-col>
                    </a-row>

                    <a-row :gutter="[16, 16]">
                        <a-col :xs="24" :md="16">
                            <a-row :gutter="[16, 16]">
                                <a-col :xs="12" :sm="6">
                                    <a-card class="apple-glass" hoverable bordered>
                                        <div class="stat-label"><icon-list></icon-list> 等待队列</div>
                                        <div class="stat-value" style="color: #F5A623;">{{ queueStatus.waiting || 0 }}</div>
                                    </a-card>
                                </a-col>
                                <a-col :xs="12" :sm="6">
                                    <a-card class="apple-glass" hoverable bordered>
                                        <div class="stat-label"><icon-cloud-upload></icon-cloud-upload> 上传中</div>
                                        <div class="stat-value" style="color: #165DFF;">{{ queueStatus.uploading || 0 }}</div>
                                    </a-card>
                                </a-col>
                                <a-col :xs="12" :sm="6">
                                    <a-card class="apple-glass" hoverable bordered>
                                        <div class="stat-label"><icon-check-circle></icon-check-circle> 成功队列</div>
                                        <div class="stat-value" style="color: #00B42A;">{{ queueStatus.success || 0 }}</div>
                                    </a-card>
                                </a-col>
                                <a-col :xs="12" :sm="6">
                                    <a-card class="apple-glass" hoverable bordered>
                                        <div class="stat-label"><icon-close-circle></icon-close-circle> 失败队列</div>
                                        <div class="stat-value" style="color: #F53F3F;">{{ queueStatus.failed || 0 }}</div>
                                    </a-card>
                                </a-col>

                                <a-col :xs="24" :lg="8">
                                    <a-card class="apple-glass" hoverable bordered style="height: 100%; display: flex; flex-direction: column;">
                                        <div class="stat-label">
                                            <icon-scan :spin="radarState.status === 'scanning'" style="margin-right: 4px; color: var(--color-primary-light-4);"></icon-scan>
                                            全局扫描调度引擎
                                        </div>

                                        <div style="margin-top: 10px; font-size: 24px; font-weight: 800; font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif; letter-spacing: 1px;" :style="{ color: radarState.color }">
                                            {{ radarState.text }}
                                        </div>

                                        <div style="margin-top: 12px; padding-top: 10px; border-top: 1px dashed var(--glass-border); display: flex; justify-content: space-between; align-items: center; font-size: 12px;">
                                            <span style="color: var(--color-text-3)">频率: <b>{{ systemStatus.dynamicInterval || systemStatus.scanningInterval }}</b> 分/次</span>

                                            <span v-if="systemStatus.dynamicInterval < systemStatus.scanningInterval" style="color: #D22ECE; font-weight: bold; display: flex; align-items: center; gap: 4px;">
                                                <icon-thunderbolt></icon-thunderbolt> 狂暴模式
                                            </span>
                                            <span v-else style="color: #00B42A; display: flex; align-items: center; gap: 4px;">
                                                <icon-clock-circle></icon-clock-circle> 节能休眠
                                            </span>
                                        </div>
                                    </a-card>
                                </a-col>

                                <a-col :xs="24" :lg="16">
                                    <a-card class="apple-glass" hoverable bordered style="height: 100%; display: flex; flex-direction: column;">
                                        <div style="display: flex; justify-content: space-between; align-items: center;">
                                            <div>
                                                <div class="stat-label"><icon-live-broadcast></icon-live-broadcast> WebSocket 实时信道</div>
                                                <div style="margin-top: 8px; display: flex; align-items: center; font-size: 15px; font-weight: 500;">
                                                    <span class="status-indicator" :class="'status-dot-' + wsStatus"></span>
                                                    <span v-if="wsStatus === 'connected'" style="color: #00B42A; letter-spacing: 0.5px;">双向通道已连接</span>
                                                    <span v-else-if="wsStatus === 'connecting'" style="color: #165DFF; letter-spacing: 0.5px;">正在握手连接...</span>
                                                    <span v-else style="color: #F53F3F; letter-spacing: 0.5px;">信道断开,自动重连</span>
                                                </div>
                                            </div>
                                            <div style="position: relative; width: 40px; text-align: center;">
                                                <icon-wifi style="font-size: 32px; color: var(--color-text-3); transition: all 0.4s ease;"
                                                           :class="['ws-icon-' + wsStatus, { 'ws-data-flash': wsStats.pulse }]"></icon-wifi>
                                            </div>
                                        </div>

                                        <div style="margin-top: 14px; padding-top: 12px; border-top: 1px dashed var(--glass-border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;">
                                            <span style="font-size: 12px; color: var(--color-text-3);">
                                                <icon-dashboard></icon-dashboard> 收发包: <b style="color: var(--color-text-1)">{{ wsStats.msgCount }}</b>
                                            </span>

                                            <span v-if="wsStatus === 'connected'"
                                                  :style="{ color: getLatencyColor(wsLatency), fontWeight: 'bold', fontSize: '14px', fontFamily: 'SF Mono, Consolas, monospace', display: 'flex', alignItems: 'center', gap: '4px' }">
                                                Ping: {{ wsLatency }} ms
                                            </span>
                                            <span v-else style="color: var(--color-text-4); font-size: 14px; fontFamily: 'SF Mono, Consolas, monospace', display: 'flex', alignItems: 'center', gap: '4px'">
                                                Ping: --
                                            </span>
                                        </div>
                                    </a-card>
                                </a-col>

                                <a-col :xs="24">
                                    <a-card class="apple-glass" hoverable bordered style="height: 100%;">
                                        <div style="display: flex; gap:12px; align-items:center; flex-wrap: wrap; height: 100%;">
                                            <div class="stat-label" style="margin-right: 4px; width: 100%;"><icon-tool></icon-tool> 队列快捷清理</div>
                                            <a-button size="small" status="danger" type="outline" @click="control('clear-fail-queue')">清空失败</a-button>
                                            <a-button size="small" status="warning" type="outline" @click="control('retry-fail-queue')">重试失败任务</a-button>
                                            <a-button size="small" status="success" type="outline" @click="control('clear-success-queue')">清空成功记录</a-button>
                                        </div>
                                    </a-card>
                                </a-col>

                            </a-row>
                        </a-col>
                        <a-col :xs="24" :md="8">
                            <a-card class="apple-glass" hoverable bordered style="height: 100%;">
                                <div class="stat-label"><icon-pie-chart></icon-pie-chart> 整体任务分布</div>
                                <div id="queueChart" style="height: 220px; margin-top: 12px;"></div>
                            </a-card>
                        </a-col>
                    </a-row>

                    <h3 style="margin: 28px 0 16px; font-size: 15px; font-weight: 500; display: flex; align-items: center; gap: 8px;">
                        <icon-folder></icon-folder> 目录监控状态 (实时)
                    </h3>
                    <a-row :gutter="[16, 16]">
                        <a-col :xs="24" :sm="12" :md="8" v-for="(dir, idx) in systemStatus.dirs" :key="idx">
                            <a-card class="apple-glass" hoverable bordered>
                                <template #title>
                                    <div style="font-size: 13px; word-break: break-all; color: var(--color-text-2); display: flex; align-items: center; gap: 6px;">
                                        <icon-drive-file></icon-drive-file> {{ dir.path }}
                                    </div>
                                </template>
                                <a-descriptions :column="2" size="medium">
                                    <a-descriptions-item label="待处理"><a-tag size="small" color="arcoblue">{{ dir.pendingFiles }}</a-tag></a-descriptions-item>
                                    <a-descriptions-item label="已上传"><a-tag size="small" color="green">{{ dir.uploadedFiles }}</a-tag></a-descriptions-item>
                                    <a-descriptions-item label="总文件">{{ dir.totalFiles }}</a-descriptions-item>
                                    <a-descriptions-item label="上传量">{{ formatSize(dir.uploadedSize) }}</a-descriptions-item>
                                </a-descriptions>
                            </a-card>
                        </a-col>
                    </a-row>
                </a-tab-pane>

                <a-tab-pane key="live">
                    <template #title><icon-thunderbolt></icon-thunderbolt> 实时任务</template>

                    <div class="action-bar" style="justify-content: space-between; align-items: center; margin-bottom: 20px;">

                            <a-row :gutter="24">
                                <a-col :xs="24" :sm="8"><a-form-item field="mailFrom" label="发件邮箱帐号 (QQ)"><a-input v-model="configForm.mailFrom" size="small" placeholder="例: 123456@qq.com"><template #prefix><icon-email></icon-email></template></a-input></a-form-item></a-col>
                                <a-col :xs="24" :sm="8"><a-form-item field="mailAuthCode" label="发件邮箱授权码"><a-input-password v-model="configForm.mailAuthCode" size="small" placeholder="例: abcdefghijklmnop"><template #prefix><icon-lock></icon-lock></template></a-input-password></a-form-item></a-col>
                                <a-col :xs="24" :sm="8"><a-form-item field="mailTo" label="收件人邮箱"><a-input v-model="configForm.mailTo" size="small" placeholder="例: admin@wustwu.cn"><template #prefix><icon-user></icon-user></template></a-input></a-form-item></a-col>
                            </a-row>
                            <a-form-item field="emailInterval" label="邮件合并发送间隔 (分钟)"><a-input-number v-model="configForm.emailInterval" :min="10" size="small"><template #prefix><icon-clock-circle></icon-clock-circle></template></a-input-number></a-form-item>

                            <a-divider style="margin: 12px 0;"><span style="color: var(--color-text-3); font-size: 12px;">本地监控配置</span></a-divider>
                            <a-form-item field="dirs" label="需被监听扫描的本地目录 (多目录用逗号 , 隔开)">
                                <a-textarea v-model="configDirsString" :auto-size="{ minRows: 3 }" size="small" placeholder="例: D:\录像\, E:\LiveRecord\"></a-textarea>
                            </a-form-item>
                            <a-row :gutter="24">
                                <a-col :xs="24" :sm="8"><a-form-item field="enableLogs" label="前端日志同步"><a-switch v-model="configForm.enableLogs" size="small"></a-switch></a-form-item></a-col>
                                <a-col :xs="24" :sm="8"><a-form-item field="autoRetry" label="失败自动重试"><a-switch v-model="configForm.autoRetry" size="small"></a-switch></a-form-item></a-col>
                                <a-col :xs="24" :sm="8"><a-form-item field="maxRetry" label="重试次数上限"><a-input-number v-model="configForm.maxRetry" :min="1" :max="10" size="small"></a-input-number></a-form-item></a-col>
                            </a-row>
                            <a-divider style="margin: 12px 0 24px 0"></a-divider>
                            <a-form-item style="margin-bottom: 0;">
                                <a-button type="primary" html-type="submit" size="medium" style="border-radius: 8px;"><template #icon><icon-save></icon-save></template> 生效并保存配置</a-button>
                                <a-button type="outline" size="medium" style="margin-left: 12px; border-radius: 8px;" @click="fetchConfig">撤销改动</a-button>
                            </a-form-item>
                        </a-form>
                    </a-card>
                </a-tab-pane>

            </a-tabs>
        </main>

        <footer class="footer-copyright">
            &copy; 2026 Lei. All Rights Reserved. <br>
            <a href="https://github.com/Xiaoxusheng/go-auto-uploader" target="_blank" style="display: inline-flex; align-items: center; gap: 4px; margin-top: 6px;">
                <icon-github></icon-github> go-auto-uploader
            </a>
        </footer>

        <a-modal v-model:visible="showLogsModal" title="录制引擎实时日志输出" width="80%" :footer="false" draggable>
            <div class="action-bar" style="margin-bottom: 12px;">
                <a-button type="primary" size="small" @click="fetchRecorderLogs"><template #icon><icon-refresh></icon-refresh></template> 刷新日志</a-button>
                <span style="color: var(--color-text-3); font-size: 13px; margin-left: 12px;">显示最后 100 行容器日志</span>
            </div>
            <div class="docker-logs" ref="dockerLogsRef">
                {{ recorderLogsContent }}
                <div v-if="!recorderLogsContent" style="color: gray;">暂无日志输出...</div>
            </div>
        </a-modal>

        <a-modal v-model:visible="showBatchAddModal" title="批量导入主播名单" @ok="handleBatchAdd" @cancel="showBatchAddModal = false" :ok-loading="batchAddLoading">
            <a-alert type="info" style="margin-bottom: 16px;">
                请在下方输入框内粘贴主播信息，<b>每行一个</b>，单次导入上限受后端安全策略保护为 <b>50</b> 个。<br>
                格式支持：<code>直播间链接</code> 或者 <code>直播间链接,主播名字</code>
            </a-alert>
            <a-textarea v-model="batchAddText" placeholder="示例:&#10;https://live.douyin.com/12345678&#10;https://live.douyin.com/87654321,张三" :auto-size="{minRows: 10, maxRows: 15}" style="font-family: monospace;"></a-textarea>
        </a-modal>

    </template>
</div>

<script>
    const { createApp, ref, reactive, onMounted, onUnmounted, computed, watch, nextTick } = Vue;
    const { Message, Modal, Notification } = ArcoVue;

    const api = axios.create({ baseURL: '/api/v1', timeout: 10000 });

    api.interceptors.response.use(
        res => {
            if (res.data.code !== 200) { Message.error(res.data.message || '请求失败'); return Promise.reject(new Error(res.data.message)); }
            return res.data;
        },
        err => {
            if (err.response && err.response.status === 401) { localStorage.removeItem('upload_system_token'); window.location.reload(); }
            Message.error(err.response?.data?.message || err.message || '网络错误');
            return Promise.reject(err);
        }
    );
    api.interceptors.request.use(config => {
        const token = localStorage.getItem('upload_system_token');
        if (token) config.headers['Authorization'] = `Bearer ${token}`;
        return config;
    });

    const app = createApp({
        setup() {
            const isDarkMode = ref(false);

            const autoSetThemeByTime = () => {
                const hour = new Date().getHours();
                isDarkMode.value = (hour < 8 || hour >= 18);
                applyTheme();
            };

            const toggleTheme = () => {
                isDarkMode.value = !isDarkMode.value;
                applyTheme();
                setTimeout(() => {
                    renderChart();
                    renderTrendChart();
                }, 100);
            };

            const applyTheme = () => {
                document.body.setAttribute('arco-theme', isDarkMode.value ? 'dark' : '');
            };

            const openGitHub = () => { window.open('https://github.com/Xiaoxusheng/go-auto-uploader', '_blank'); };

            const isLoggedIn = ref(!!localStorage.getItem('upload_system_token'));
            const loginLoading = ref(false);
            const activeTab = ref('overview');

            const wsStatus = ref('connecting');
            const wsStats = reactive({ msgCount: 0, lastEvent: '-', pulse: false });
            let wsPulseTimeout = null;

            const wsLatency = ref(0);
            let pingTimer = null;

            const getLatencyColor = (ms) => {
                if (ms === 0) return 'var(--color-text-3)';
                if (ms <= 50) return '#00B42A';
                if (ms <= 150) return '#FF7D00';
                return '#F53F3F';
            };

            const liveTaskFilter = ref('uploading');

            let pollingTimer = null;
            let ws = null;

            const loginForm = reactive({ username: 'admin', password: 'admin', otp: '' });

            const systemStatus = reactive({ running: false, uptime: 0, workers: 0, rate: 0, dirs: [], dynamicInterval: 0, nextScanTime: 0, scanningInterval: 0 });
            const queueStatus = reactive({ waiting: 0, uploading: 0, success: 0, failed: 0, retrying: 0 });

            const trafficMetrics = reactive({ speed: 0, time: 0 });

            const statsData = reactive({ trend: [], rank: [] });
            let trendChartInstance = null;
            window.lastStatsStr = '';

            const liveTasks = ref([]);
            const clientTime = ref(Date.now());

            const streamers = ref([]);
            const newStreamer = reactive({ url: '', name: '' });
            const activeStreamersCount = computed(() => streamers.value.filter(s => s.active).length);
            const isSavingStreamers = ref(false);

            const streamerSearchQuery = ref('');
            const streamerSearchRef = ref(null);
            const activeRecordingStreamers = ref([]);

            const onlineStreamersCount = computed(() => {
                return streamers.value.filter(s => activeRecordingStreamers.value.includes(s.name) && s.active).length;
            });

            const filteredStreamers = computed(() => {
                let list = streamers.value;
                if (streamerSearchQuery.value) {
                    const lower = streamerSearchQuery.value.trim().toLowerCase();
                    list = list.filter(s =>
                        (s.name && s.name.toLowerCase().includes(lower)) ||
                        (s.url && s.url.toLowerCase().includes(lower))
                    );
                }

                return list.slice().sort((a, b) => {
                    const aOnline = activeRecordingStreamers.value.includes(a.name) && a.active;
                    const bOnline = activeRecordingStreamers.value.includes(b.name) && b.active;

                    if (aOnline && !bOnline) return -1;
                    if (!aOnline && bOnline) return 1;

                    if (a.active && !b.active) return -1;
                    if (!a.active && b.active) return 1;

                    return 0;
                });
            });

            const handleGlobalKeydown = (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'x') {
                    if (activeTab.value === 'streamers') {
                        e.preventDefault();
                        if (streamerSearchRef.value) {
                            streamerSearchRef.value.focus();
                            Message.info('已激活搜索框');
                        }
                    }
                }
            };

            const recorderStatus = ref('读取中...');
            const recorderControlLoading = ref(false);
            const showLogsModal = ref(false);
            const recorderLogsContent = ref('');
            const dockerLogsRef = ref(null);

            const showBatchAddModal = ref(false);
            const batchAddText = ref('');
            const batchAddLoading = ref(false);

            // ⭐ 更新：绑定 liveSavePath 参数
            const cookiesForm = reactive({ douyin: '', kuaishou: '', sooplive: '', liveSavePath: '' });
            const cookiesLoading = ref(false);

            const radarState = computed(() => {
                const next = systemStatus.nextScanTime;

                if (!systemStatus.running || next === 0) {
                    return { status: 'paused', text: '系统已挂起', color: 'var(--color-text-3)' };
                }

                if (next === -1) {
                    return { status: 'scanning', text: '正在同步目录状态...', color: '#165DFF' };
                }

                const diffSeconds = Math.floor((next - clientTime.value) / 1000);
                if (diffSeconds < 0) {
                    return { status: 'scanning', text: '准备执行扫描...', color: '#165DFF' };
                }

                const m = Math.floor(diffSeconds / 60).toString().padStart(2, '0');
                const s = (diffSeconds % 60).toString().padStart(2, '0');

                const isUrgent = diffSeconds <= 60;

                return {
                    status: 'waiting',
                    text: `${m} 分 ${s} 秒`,
                    color: isUrgent ? '#F53F3F' : 'var(--color-text-1)'
                };
            });

            const calculateRankPercent = (size) => {
                if (!statsData.rank || statsData.rank.length === 0 || size === 0) return 0;
                const max = statsData.rank[0].size;
                return Number((size / max).toFixed(2));
            };

            const fetchCookies = async () => {
                if (!configForm.value.recorderConfigPath) return;
                cookiesLoading.value = true;
                try {
                    const res = await api.get('/cookies');
                    Object.assign(cookiesForm, res.data);
                } catch(e) {} finally {
                    cookiesLoading.value = false;
                }
            };

            const saveCookies = async () => {
                if (!configForm.value.recorderConfigPath) {
                    Message.warning('系统安全拦截：请先在【系统参数设置】中配置 config.ini 物理路径！');
                    return;
                }
                cookiesLoading.value = true;
                try {
                    await api.put('/cookies', cookiesForm);
                    Message.success('录制引擎配置已安全追记至文件！');
                } catch(e) {} finally {
                    cookiesLoading.value = false;
                }
            };

            const uploadingTasks = computed(() => liveTasks.value.filter(t => t.status === 'uploading' || t.status === 'waiting'));
            const completedTasks = computed(() => liveTasks.value.filter(t => t.status !== 'uploading' && t.status !== 'waiting'));

            const historyQuery = reactive({ page: 1, limit: 15, filename: '', status: '' });
            const historyData = reactive({ items: [], total: 0 });
            const pagination = computed(() => ({ total: historyData.total, current: historyQuery.page, pageSize: historyQuery.limit, size: 'small' }));

            const logQuery = reactive({ page: 1, limit: 50, level: '', keyword: '' });
            const logData = reactive({ items: [], total: 0 });
            const logExportLimit = ref(1000);
            const logContainerRef = ref(null);

            const configForm = ref({});
            const configDirsString = ref('');

            let originalConfigSnapshot = {};

            let chartInstance = null;

            const renderChart = () => {
                if (activeTab.value !== 'overview') return;
                nextTick(() => {
                    const dom = document.getElementById('queueChart');
                    if (!dom) return;
                    if (!chartInstance) chartInstance = echarts.init(dom);

                    const total = queueStatus.waiting + queueStatus.uploading + queueStatus.success + queueStatus.failed;

                    if (total === 0) {
                        chartInstance.setOption({
                            title: { text: '暂无任务数据', left: 'center', top: 'center', textStyle: { color: '#999', fontSize: 14 } },
                            series: []
                        });
                        return;
                    }
                    const option = {
                        backgroundColor: 'transparent',
                        tooltip: { trigger: 'item', formatter: '{b}状态: {c} 个文件 ({d}%)' },
                        legend: { bottom: '4%', left: 'center', textStyle: { color: isDarkMode.value ? '#E5E6EB' : '#1D2129' }, itemGap: 12 },
                        color: ['#F5A623', '#165DFF', '#00B42A', '#F53F3F'],
                        series: [{
                            type: 'pie',
                            radius: ['40%', '65%'],
                            center: ['50%', '40%'],
                            avoidLabelOverlap: true,
                            itemStyle: { borderRadius: 6, borderColor: isDarkMode.value ? '#232324' : '#ffffff', borderWidth: 2 },
                            label: { show: false, position: 'center' },
                            emphasis: { label: { show: true, fontSize: '16', fontWeight: 'bold' } },
                            labelLine: { show: false },
                            data: [
                                { value: queueStatus.waiting, name: '等待中' },
                                { value: queueStatus.uploading, name: '上传中' },
                                { value: queueStatus.success, name: '已成功' },
                                { value: queueStatus.failed, name: '已失败' }
                            ]
                        }]
                    };
                    chartInstance.setOption(option);
                });
            };

            const renderTrendChart = () => {
                const dom = document.getElementById('trendChart');
                if (!dom) return;
                if (!trendChartInstance) trendChartInstance = echarts.init(dom);

                const isDark = document.body.getAttribute('arco-theme') === 'dark';
                const textColor = isDark ? 'rgba(255,255,255,0.7)' : '#4E5969';
                const splitLineColor = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.05)';

                const option = {
                    grid: { top: '15%', left: '3%', right: '4%', bottom: '8%', containLabel: true },
                    tooltip: {
                        trigger: 'axis',
                        backgroundColor: isDark ? '#232324' : '#fff',
                        borderColor: 'rgba(0,0,0,0.1)',
                        textStyle: { color: isDark ? '#fff' : '#000' }
                    },
                    legend: {
                        data: ['上传流量 (GB)', '文件数量 (个)'],
                        textStyle: { color: textColor },
                        top: '0%',
                        right: 10
                    },
                    xAxis: {
                        type: 'category',
                        data: (statsData.trend || []).map(i => i.date),
                        axisLine: { lineStyle: { color: splitLineColor } },
                        axisLabel: { color: textColor }
                    },
                    yAxis: [
                        {
                            type: 'value', name: 'GB',
                            splitLine: { lineStyle: { color: splitLineColor } },
                            axisLabel: { color: textColor }
                        },
                        {
                            type: 'value', name: '个', position: 'right',
                            splitLine: { show: false },
                            axisLabel: { color: textColor }
                        }
                    ],
                    series: [
                        {
                            name: '上传流量 (GB)',
                            type: 'line',
                            smooth: true,
                            yAxisIndex: 0,
                            data: (statsData.trend || []).map(i => i.size.toFixed(2)),
                            areaStyle: {
                                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                    { offset: 0, color: 'rgba(22, 93, 255, 0.4)' },
                                    { offset: 1, color: 'rgba(22, 93, 255, 0)' }
                                ])
                            },
                            itemStyle: { color: '#165DFF' },
                            lineStyle: { width: 3 }
                        },
                        {
                            name: '文件数量 (个)',
                            type: 'line',
                            smooth: true,
                            yAxisIndex: 1,
                            data: (statsData.trend || []).map(i => i.count),
                            itemStyle: { color: '#FF7D00' },
                            lineStyle: { width: 3, type: 'dashed' }
                        }
                    ]
                };
                trendChartInstance.setOption(option);
            };

            watch(queueStatus, renderChart, { deep: true });
            watch(activeTab, (val) => {
                if (val === 'overview') {
                    setTimeout(() => {
                        renderChart();
                        renderTrendChart();
                    }, 200);
                }
            });
            window.addEventListener('resize', () => {
                if(chartInstance) chartInstance.resize();
                if(trendChartInstance) trendChartInstance.resize();
            });

            const handleLogin = async () => {
                loginLoading.value = true;
                try {
                    const res = await api.post('/auth/login', loginForm);
                    localStorage.setItem('upload_system_token', res.data.token);
                    isLoggedIn.value = true;
                    Message.success('登录系统成功');
                    initDashboard();
                } catch (e) {} finally { loginLoading.value = false; }
            };

            const handleLogout = async () => {
                try { await api.post('/auth/logout'); } catch (e) {}
                localStorage.removeItem('upload_system_token');
                isLoggedIn.value = false; cleanUp();
            };

            const fetchStatus = async () => { try { Object.assign(systemStatus, (await api.get('/status')).data); } catch (e) {} };
            const fetchQueue = async () => { try { Object.assign(queueStatus, (await api.get('/tasks/queue')).data); } catch (e) {} };
            const fetchLiveTasks = async () => { try { liveTasks.value = (await api.get('/tasks/live')).data || []; } catch (e) {} };

            const fetchRecorderStatus = async () => {
                try {
                    const res = await api.get('/recorder/status');
                    recorderStatus.value = res.data || '获取失败';
                } catch (e) {
                    recorderStatus.value = '离线/异常';
                }
            };

            const controlRecorder = async (action) => {
                if (!configForm.value.recorderContainer) {
                    Message.error('请先在系统参数设置中配置 Docker 容器名');
                    activeTab.value = 'settings';
                    return;
                }
                recorderControlLoading.value = true;
                try {
                    await api.post('/recorder/control', null, { params: { action } });
                    Message.success('操作已成功执行');
                    fetchRecorderStatus();
                } catch (e) {} finally {
                    recorderControlLoading.value = false;
                }
            };

            const fetchRecorderLogs = async () => {
                try {
                    const res = await api.get('/recorder/logs');
                    recorderLogsContent.value = res.data;
                    nextTick(() => {
                        if (dockerLogsRef.value) {
                            dockerLogsRef.value.scrollTop = dockerLogsRef.value.scrollHeight;
                        }
                    });
                } catch (e) {}
            };

            const openLogsModal = () => {
                showLogsModal.value = true;
                fetchRecorderLogs();
            };

            const fetchActiveStreamers = async () => {
                try {
                    const res = await api.get('/streamers/active');
                    activeRecordingStreamers.value = res.data || [];
                } catch (e) {}
            };

            const fetchStreamers = async () => {
                if (isSavingStreamers.value) return;
                try {
                    const res = await api.get('/streamers');
                    streamers.value = res.data || [];
                } catch (e) {}
            };

            const saveStreamers = async (showMsg = true) => {
                isSavingStreamers.value = true;
                try {
                    await api.put('/streamers', streamers.value);
                    if (showMsg) Message.success('录制名单配置已热更新并保存到文件');
                } catch (e) {
                } finally {
                    setTimeout(() => { isSavingStreamers.value = false; }, 500);
                }
            };

            const addStreamer = () => {
                if (!newStreamer.url) {
                    Message.warning('请输入直播间链接');
                    return;
                }
                streamers.value.unshift({
                    url: newStreamer.url.trim(),
                    name: newStreamer.name.trim(),
                    active: true
                });
                newStreamer.url = '';
                newStreamer.name = '';
                saveStreamers();
            };

            const handleBatchAdd = async () => {
                if (!batchAddText.value.trim()) {
                    Message.warning('请输入要批量添加的主播内容');
                    return false;
                }

                const lines = batchAddText.value.split('\n').map(l => l.trim()).filter(l => l);
                if (lines.length > 50) {
                    Message.error(`后端安全配置拦截：单次最多添加 50 个，您当前输入了 ${lines.length} 个`);
                    return false;
                }

                const newEntries = [];
                for (const line of lines) {
                    let url = line;
                    let name = '';

                    const commaIndex = line.indexOf(',') > -1 ? line.indexOf(',') : line.indexOf('，');
                    if (commaIndex > -1) {
                        url = line.substring(0, commaIndex).trim();
                        name = line.substring(commaIndex + 1).trim();
                    }
                    if (url) {
                        newEntries.push({ url, name, active: true });
                    }
                }

                if (newEntries.length === 0) {
                    Message.warning('未能解析到有效的直播间链接，请检查格式');
                    return false;
                }

                batchAddLoading.value = true;
                try {
                    await api.post('/streamers', newEntries);
                    Message.success(`成功批量添加了 ${newEntries.length} 个主播记录`);
                    batchAddText.value = '';
                    showBatchAddModal.value = false;
                    return true;
                } catch (e) {
                    return false;
                } finally {
                    batchAddLoading.value = false;
                }
            };

            const removeStreamer = (record) => {
                const index = streamers.value.findIndex(s => s.url === record.url);
                if (index > -1) {
                    streamers.value.splice(index, 1);
                    saveStreamers();
                    Message.success('已成功删除该主播记录');
                }
            };

            const triggerWsPulse = (eventType) => {
                wsStats.msgCount++;
                wsStats.lastEvent = eventType;
                wsStats.pulse = true;
                if (wsPulseTimeout) clearTimeout(wsPulseTimeout);
                wsPulseTimeout = setTimeout(() => { wsStats.pulse = false; }, 150);
            };

            const connectWS = () => {
                if (ws) {
                    ws.onclose = null;
                    ws.close();
                }
                wsStatus.value = 'connecting';

                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                ws = new WebSocket(`${protocol}//${window.location.host}/ws/live`);

                ws.onopen = () => {
                    wsStatus.value = 'connected';

                    if (pingTimer) clearInterval(pingTimer);
                    pingTimer = setInterval(() => {
                        if (ws.readyState === WebSocket.OPEN) {
                            ws.send(JSON.stringify({ type: 'ping', payload: Date.now() }));
                        }
                    }, 5000);
                };

                ws.onmessage = (event) => {
                    try {
                        const msg = JSON.parse(event.data);

                        if (msg.type === 'pong') {
                            wsLatency.value = Date.now() - msg.payload;
                            return;
                        }

                        triggerWsPulse(msg.type);

                        if (msg.type === 'systemAlert') {
                            const payload = msg.payload;
                            Notification[payload.level || 'error']({
                                title: payload.title,
                                content: payload.message + `\n\n触发时间: ${payload.time}`,
                                duration: 0,
                                closable: true,
                                position: 'bottomRight',
                                style: {
                                    whiteSpace: 'pre-wrap',
                                    wordBreak: 'break-all',
                                    lineHeight: '1.6'
                                }
                            });
                        } else if (msg.type === 'trafficMetrics') {
                            trafficMetrics.speed = msg.payload.speed;
                            trafficMetrics.time = msg.payload.time;
                        } else if (msg.type === 'statsTrend') {
                            const newStr = JSON.stringify(msg.payload);
                            if (window.lastStatsStr !== newStr) {
                                window.lastStatsStr = newStr;
                                statsData.trend = msg.payload.trend || [];
                                statsData.rank = msg.payload.rank || [];

                                if (activeTab.value === 'overview' && statsData.trend.length > 0) {
                                    nextTick(() => renderTrendChart());
                                }
                            }
                        } else if (msg.type === 'recorderStatus') {
                            recorderStatus.value = msg.payload;
                        } else if (msg.type === 'activeStreamers') {
                            activeRecordingStreamers.value = msg.payload || [];
                        } else if (msg.type === 'streamersData') {
                            if (!isSavingStreamers.value) {
                                const newStr = JSON.stringify(msg.payload);
                                if (window.lastStreamersStr !== newStr) {
                                    streamers.value = msg.payload;
                                    window.lastStreamersStr = newStr;
                                }
                            }
                        } else if (msg.type === 'uploadProgress') {
                            const idx = liveTasks.value.findIndex(t => t.id === msg.payload.id);
                            if (idx > -1) {
                                liveTasks.value[idx].uploaded = msg.payload.uploaded;
                                liveTasks.value[idx].speed = msg.payload.speed;
                                liveTasks.value[idx].status = msg.payload.status;
                            } else {
                                liveTasks.value.unshift({
                                    id: msg.payload.id,
                                    filename: msg.payload.filename,
                                    path: msg.payload.path,
                                    size: msg.payload.size,
                                    uploaded: msg.payload.uploaded,
                                    speed: msg.payload.speed,
                                    status: msg.payload.status,
                                    startTime: msg.payload.startTime,
                                    duration: 0
                                });
                            }
                        } else if (msg.type === 'systemStatus') {
                            Object.assign(systemStatus, msg.payload);
                        } else if (msg.type === 'queueStatus') {
                            Object.assign(queueStatus, msg.payload);
                        } else if (msg.type === 'taskDone') {
                            const idx = liveTasks.value.findIndex(t => t.id === msg.payload.id);
                            if (idx > -1) {
                                liveTasks.value[idx].status = msg.payload.status;
                                if (msg.payload.progress === 100) liveTasks.value[idx].uploaded = liveTasks.value[idx].size;
                                if (msg.payload.error) liveTasks.value[idx].error = msg.payload.error;
                            }
                            if (activeTab.value === 'history') fetchHistory();
                        } else if (msg.type === 'newLog') {
                            const log = msg.payload;
                            if (logQuery.page === 1 && !logQuery.keyword && (!logQuery.level || logQuery.level === log.level)) {
                                logData.items.push(log);
                                logData.total++;
                                if (logData.items.length > logQuery.limit) {
                                    logData.items.shift();
                                }
                            }
                        } else if (msg.type === 'scanStarted') {
                            let titleText = '📡 系统扫描已启动';
                            let contentText = `当前并发：${msg.payload.workers} 个线程\n扫描目标：共 ${msg.payload.dirs.length} 个目录`;

                            if (msg.payload.trigger === 'auto') {
                                titleText = '⏱️ 定时扫描执行中';
                                contentText = `定时周期：${msg.payload.interval} 分钟/次\n` + contentText;
                            } else if (msg.payload.trigger === 'start') {
                                titleText = '▶️ 系统已恢复运行';
                            } else if (msg.payload.trigger === 'rescan') {
                                titleText = '🔍 手动深度扫描启动';
                            } else if (msg.payload.trigger === 'config-update') {
                                titleText = '⚙️ 配置重载扫描';
                            }

                            Notification.info({
                                title: titleText,
                                content: contentText,
                                position: 'bottomRight',
                                duration: 4000,
                                style: { whiteSpace: 'pre-wrap', lineHeight: '1.6' }
                            });
                        } else if (msg.type === 'scanFinished') {
                            Notification.success({
                                title: '✅ 扫描侦测完毕',
                                content: `本轮深度比惊完成，共发现并压入 ${msg.payload.added} 个新文件至队列中。`,
                                position: 'bottomRight',
                                duration: 4000
                            });
                        }
                    } catch (e) {}
                };

                ws.onclose = () => {
                    wsStatus.value = 'disconnected';
                    wsLatency.value = 0;
                    if (pingTimer) clearInterval(pingTimer);
                    if (isLoggedIn.value) setTimeout(connectWS, 5000);
                };

                ws.onerror = () => {
                    wsStatus.value = 'disconnected';
                };
            };

            const control = (action) => {
                const actionText = {
                    'start': '确定要启动系统，开始扫描并上传文件吗？',
                    'pause': '确定要暂停系统吗？\n(注意：正在上传的文件会继续，但不会处理新任务)',
                    'stop': '危险操作：确定要强行停止系统吗？\n(这可能会打断当前的上传任务)',
                    'rescan': '确定要立刻手动触发一轮完整的深度扫描吗？',
                    'relogin': '确定要强制刷新远端服务器的授权 Token 吗？',
                    'clear-fail-queue': '确定要清空所有【失败记录】吗？此操作不可恢复。',
                    'retry-fail-queue': '确定要将所有失败任务重新放入队列执行吗？',
                    'clear-success-queue': '确定要清空所有【成功记录】吗？此操作不可恢复。'
                };

                Modal.confirm({
                    title: '系统操作确认',
                    content: actionText[action] || '确定要执行此操作吗？',
                    okText: '确认执行',
                    cancelText: '取消',
                    onOk: async () => {
                        try {
                            await api.post(`/control/${action}`);
                            Message.success('指令已成功下发');
                        } catch (e) {}
                    }
                });
            };

            const fetchHistory = async () => {
                try {
                    const res = await api.get('/tasks/history', { params: historyQuery });
                    historyData.items = res.data.items || []; historyData.total = res.data.total || 0;
                } catch (e) {}
            };
            const onPageChange = (page) => { historyQuery.page = page; fetchHistory(); };

            const fetchLogs = async () => {
                try {
                    const res = await api.get('/logs', { params: logQuery });
                    logData.items = res.data.items || [];
                    logData.total = res.data.total || 0;
                } catch (e) {}
            };

            const downloadLogs = () => {
                const url = `/api/v1/logs/download?level=${logQuery.level}&keyword=${logQuery.keyword}&limit=${logExportLimit.value}`;
                window.open(url, '_blank');
            };

            const fetchConfig = async () => {
                try {
                    const res = await api.get('/config');
                    configForm.value = res.data || {};
                    originalConfigSnapshot = JSON.parse(JSON.stringify(res.data || {}));
                    configDirsString.value = (res.data.dirs || []).join(', ');
                } catch (e) {}
            };

            const saveConfig = async () => {
                try {
                    configForm.value.dirs = configDirsString.value.split(',').map(s => s.trim()).filter(s => s);
                    await api.put('/config', configForm.value);

                    let changes = [];
                    if (configForm.value.liveConfigPath !== originalConfigSnapshot.liveConfigPath) changes.push(`📄 录制名单路径已更新`);
                    if (configForm.value.recorderConfigPath !== originalConfigSnapshot.recorderConfigPath) changes.push(`⚙️ 引擎配置 config.ini 路径已更新`);
                    if (configForm.value.recorderContainer !== originalConfigSnapshot.recorderContainer) changes.push(`💻 容器名已更新`);
                    if (configForm.value.remoteServer !== originalConfigSnapshot.remoteServer) changes.push(`🔗 API 地址已更新`);
                    // 追加：邮箱配置更新提醒
                    if (configForm.value.mailFrom !== originalConfigSnapshot.mailFrom || configForm.value.mailTo !== originalConfigSnapshot.mailTo) changes.push(`📧 邮箱推送配置已更新`);

                    const oldDirs = (originalConfigSnapshot.dirs || []).join(',');
                    const newDirs = (configForm.value.dirs || []).join(',');
                    if (oldDirs !== newDirs) changes.push(`📁 监控目录已变更为 ${configForm.value.dirs.length} 个`);

                    let changeText = changes.length > 0 ? changes.join('\n') : '本次保存无数值变动，已触发重载。';

                    Notification.success({
                        title: '⚙️ 系统参数已生效并下发',
                        content: changeText,
                        position: 'bottomRight',
                        duration: 5000,
                        style: { whiteSpace: 'pre-wrap', lineHeight: '1.6' }
                    });

                    originalConfigSnapshot = JSON.parse(JSON.stringify(configForm.value));
                } catch (e) {}
            };

            const formatSize = (bytes) => {
                if (!bytes) return '0 B';
                const k = 1024, sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
                const i = Math.floor(Math.log(bytes) / Math.log(k));
                return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
            };

            const formatSpeed = (bps) => formatSize(bps) + '/s';
            const calculatePercent = (up, tot) => (!tot ? 0 : Number((up / tot).toFixed(2)));

            const formatDurationSeconds = (sec) => {
                if (!sec && sec !== 0) return '-';
                if (sec === 0) return '< 1s';
                const m = Math.floor(sec / 60);
                const s = sec % 60;
                return m > 0 ? `${m}m ${s}s` : `${s}s`;
            };

            const formatDuration = (seconds) => {
                const h = Math.floor(seconds / 3600), m = Math.floor((seconds % 3600) / 60);
                return `${h}h ${m}m`;
            };

            const getElapsedTime = (startTime) => {
                if (!startTime) return '0s';
                return formatDurationSeconds(Math.floor((clientTime.value - startTime) / 1000));
            };

            const formatStatusText = (status) => {
                if (!status) return '未知';
                const lower = status.toLowerCase();
                if (lower.includes('success(秒传)')) return '成功 (秒传)';
                if (lower.includes('success')) return '成功';
                if (lower.includes('fail')) return '失败';
                if (lower === 'uploading') return '处理中';
                if (lower === 'waiting') return '等待中';
                return status;
            };

            const getStatusColor = (status) => {
                if (status.includes('success')) return 'green';
                if (status.includes('fail')) return 'red';
                if (status === 'uploading') return 'arcoblue';
                return 'orange';
            };
            const getLogLevelColor = (level) => ({ 'info': '#00b42a', 'error': '#f53f3f', 'warn': '#ff7d00' }[level] || 'var(--color-text-3)');

            const initDashboard = () => {
                fetchStatus(); fetchQueue(); fetchLiveTasks(); fetchHistory(); fetchLogs(); fetchConfig();
                connectWS();
                if (pollingTimer) clearInterval(pollingTimer);
                pollingTimer = setInterval(() => {
                    clientTime.value = Date.now();
                }, 1000);
            };

            const cleanUp = () => {
                if (pollingTimer) clearInterval(pollingTimer);
                if (pingTimer) clearInterval(pingTimer);
                if (ws) { ws.onclose = null; ws.close(); }
                if (chartInstance) { chartInstance.dispose(); chartInstance = null; }
                if (trendChartInstance) { trendChartInstance.dispose(); trendChartInstance = null; }
            };

            onMounted(() => {
                autoSetThemeByTime();
                if (isLoggedIn.value) initDashboard();
                window.addEventListener('keydown', handleGlobalKeydown);
            });
            onUnmounted(() => {
                cleanUp();
                window.removeEventListener('keydown', handleGlobalKeydown);
            });

            watch(activeTab, (newTab) => {
                if (newTab === 'logs') fetchLogs();
                if (newTab === 'history') fetchHistory();
                if (newTab === 'cookies') fetchCookies();
                if (newTab === 'streamers') {
                    fetchRecorderStatus();
                    fetchStreamers();
                    fetchActiveStreamers();
                }
            });

            watch(() => logData.items, () => {
                nextTick(() => {
                    if (logContainerRef.value) {
                        logContainerRef.value.scrollTop = logContainerRef.value.scrollHeight;
                    }
                });
            }, { deep: true });

            return {
                isDarkMode, toggleTheme, openGitHub,
                isLoggedIn, loginLoading, loginForm, activeTab, handleLogin, handleLogout,
                wsStatus, wsStats, wsLatency, getLatencyColor, liveTaskFilter,
                systemStatus, queueStatus, liveTasks, uploadingTasks, completedTasks, control,
                historyQuery, historyData, pagination, fetchHistory, onPageChange,
                logQuery, logData, logExportLimit, logContainerRef, fetchLogs, downloadLogs,
                configForm, configDirsString, fetchConfig, saveConfig,
                streamers, newStreamer, activeStreamersCount, fetchStreamers, saveStreamers, addStreamer, removeStreamer,
                activeRecordingStreamers, onlineStreamersCount,
                showBatchAddModal, batchAddText, batchAddLoading, handleBatchAdd,
                cookiesForm, cookiesLoading, fetchCookies, saveCookies,
                radarState,
                recorderStatus, recorderControlLoading, showLogsModal, recorderLogsContent, dockerLogsRef, fetchRecorderStatus, controlRecorder, fetchRecorderLogs, openLogsModal,
                formatSize, formatSpeed, calculatePercent, formatDuration, formatDurationSeconds, getElapsedTime, getStatusColor, getLogLevelColor, fetchLiveTasks, formatStatusText,
                streamerSearchQuery, streamerSearchRef, filteredStreamers,
                trafficMetrics, statsData, calculateRankPercent
            };
        }
    });

    app.use(ArcoVue);
    app.use(ArcoVueIcon);
    app.mount('#app');
</script>
</body>
</html>
